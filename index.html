<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dony Burguer's - Painel do Entregador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .filter-invert { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body class="bg-[#0d0e12] text-[#e2e8f0] font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-[#161820] p-4 text-center border-b-2 border-[#00f2ff] shadow-lg">
        <h1 class="text-xl font-bold tracking-wider text-[#00f2ff]">DONY BURGUER'S</h1>
        <p class="text-xs text-zinc-400 tracking-widest mt-1">SISTEMA LOGÍSTICO DE ENTREGA</p>
    </header>

    <main class="flex-1 p-4 flex flex-col items-center gap-4 max-w-md mx-auto w-full">
        
        <div id="mapContainer" class="hidden w-full h-64 rounded-xl border border-[#00f2ff] overflow-hidden shadow-2xl mb-2">
            <div id="map" class="w-full h-full"></div>
        </div>

        <div id="areaIdentificacao" class="w-full bg-[#161820] rounded-xl p-4 border border-zinc-800 shadow-xl">
            <label class="block text-xs font-bold uppercase tracking-wider text-amber-500 mb-2">Piloto Operacional:</label>
            <input type="text" id="nomeMotoboy" class="w-full p-3 bg-[#0d0e12] border border-zinc-700 rounded-lg text-white font-semibold text-center focus:border-[#00f2ff] focus:outline-none uppercase" placeholder="DIGITE SEU NOME">
        </div>

        <div class="w-full bg-[#161820] rounded-xl p-4 border-l-4 border-amber-500 shadow-xl">
            <span class="text-xs font-bold uppercase tracking-widest text-amber-500 block mb-2"><i class="fas fa-box"></i> Entrega Atual Solicitada</span>
            <div id="dadosEntrega" class="flex flex-col gap-2">
                <p class="text-sm"><span class="text-zinc-500 font-mono">CLIENTE:</span> <strong id="entCliente" class="text-white">Aguardando comando do PDV...</strong></p>
                <p class="text-sm"><span class="text-zinc-500 font-mono">ENDEREÇO:</span> <span id="entEndereco" class="text-zinc-300 font-medium">---</span></p>
            </div>
        </div>

        <button id="btnRota" onclick="alternarRastreamento()" class="w-full bg-amber-500 hover:bg-amber-600 text-zinc-950 font-black py-4 rounded-xl shadow-lg transition-all uppercase tracking-wider flex items-center justify-center gap-2">
            <i class="fas fa-motorcycle"></i> Iniciar Rota de Entrega
        </button>
    </main>

    <script>
        const db = firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"}).database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        let map, motoMarker, clientMarker, routePolyline;

        db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).on('value', snap => {
            const pedido = snap.val();
            if(pedido) {
                document.getElementById('entCliente').innerText = pedido.cliente.toUpperCase();
                document.getElementById('entEndereco').innerText = pedido.endereco.toUpperCase();
                
                // Exibe o mapa e inicializa
                document.getElementById('mapContainer').classList.remove('hidden');
                inicializarMapa(pedido.latDestino, pedido.lngDestino);
            }
        });

        function inicializarMapa(latDestino, lngDestino) {
            if (!map) {
                map = L.map('map').setView([-2.9903, -60.0673], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'filter-invert' }).addTo(map);
            }
            if (motoMarker) map.removeLayer(motoMarker);
            if (clientMarker) map.removeLayer(clientMarker);

            motoMarker = L.marker([-2.9903, -60.0673]).addTo(map).bindPopup("Banca da Merenda").openPopup();
            clientMarker = L.marker([latDestino, lngDestino]).addTo(map).bindPopup("Cliente");

            if (routePolyline) map.removeLayer(routePolyline);
            routePolyline = L.polyline([[-2.9903, -60.0673], [latDestino, lngDestino]], {color: '#00f2ff', weight: 6, dashArray: '10, 10'}).addTo(map);
            map.fitBounds(routePolyline.getBounds());
        }

        function alternarRastreamento() { /* Lógica de Rastreamento mantida */ }
    </script>
</body>
</html>
