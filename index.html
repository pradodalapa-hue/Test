<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP SISTEMAS — SOBERANO FILE MANAGER (COM ESPELHAMENTO ANDROID)</title>
    <!-- TAILWIND E ICONES PARA ALTA PERFORMANCE -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- CAPACITOR RUNTIME (Injetado automaticamente pelo Capacitor no APK) -->
    <script src="capacitor.js"></script>

    <style>
        :root {
             --gold: #fde047;
             --bg: #020617;
             --cyan: #06b6d4;
        }
        body {
             margin: 0;
             background: var(--bg);
             color: var(--gold);
             font-family: 'JetBrains Mono', monospace;
             user-select: none;
             -webkit-user-select: none;
        }
        .app-bar {
             background: #0f172a;
             border-bottom: 1px solid rgba(6, 182, 212, 0.3);
        }
        .file-item {
             border-bottom: 1px solid rgba(253, 224, 71, 0.05);
             transition: all 0.2s ease;
        }
        .file-item:hover {
             background: rgba(6, 182, 212, 0.08);
             border-left: 4px solid var(--cyan);
        }
        .jdp-card {
             background: rgba(15, 23, 42, 0.98);
             border: 2px solid var(--cyan);
             backdrop-filter: blur(12px);
             border-radius: 12px;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-24">

    <!-- BARRA SUPERIOR -->
    <div class="app-bar p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <span onclick="goBack()" class="cursor-pointer text-xl hover:scale-110 transition text-cyan-400">⬅️</span>
            <div>
                <div id="pathDisp" class="text-xs text-white font-bold font-mono">/sdcard</div>
                <div class="text-[9px] text-yellow-400 font-mono" id="syncStatus">Sincronizador Android: Ocioso</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-cyan-500 animate-pulse"></span>
            <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-wider">HELENA CORE V3</span>
        </div>
    </div>

    <!-- CONSOLE DE LOGS DE BACKUP (ESTILO HELENA INDUSTRIAL) -->
    <div class="max-w-6xl w-full mx-auto px-4 mt-2">
        <div class="bg-slate-950 border border-cyan-500/20 rounded p-2 text-[9px] text-slate-400 font-mono h-20 overflow-y-auto" id="terminalLogs">
            [HELENA CORE]: Olá, Sr. José. Sistema de diretórios virtuais pronto. Crie pastas e execute seus arquivos .html em tempo real.
        </div>
    </div>

    <!-- LISTAGEM DE ARQUIVOS -->
    <div class="max-w-6xl w-full mx-auto p-4 flex-1">
        <div id="list" class="divide-y divide-slate-800 bg-slate-950/50 rounded-xl border border-slate-800/80 overflow-hidden">
            <!-- Injetado dinamicamente -->
        </div>
    </div>

    <!-- BOTÕES FLUTUANTES (FAB) -->
    <div class="fixed bottom-6 right-6 z-50">
        <div class="hidden flex-col gap-2 mb-3 items-end" id="fabMenu">
            <button onclick="forceBackupAll()" class="bg-yellow-500 border border-yellow-300 text-black px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                🔄 Sincronizar Tudo
            </button>
            <button onclick="openModal('folder')" class="bg-slate-900 border border-yellow-400 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                📁 Criar Pasta (/minha)
            </button>
            <button onclick="openModal('text')" class="bg-slate-900 border border-cyan-400 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg flex items-center gap-2">
                📄 Criar HTML / Texto
            </button>
        </div>
        <button onclick="toggleMenu()" class="w-14 h-14 bg-cyan-500 text-black font-black text-2xl rounded-full flex items-center justify-center shadow-2xl hover:scale-105 transition">
            +
        </button>
    </div>

    <!-- MODAL DE CRIAÇÃO -->
    <div id="modal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md jdp-card p-6 z-50">
        <h3 id="mTitle" class="text-white font-black text-sm uppercase tracking-wider mb-4">Criar Novo Item</h3>
        <input type="text" id="mName" placeholder="Ex: minha ou index.html" class="w-full bg-black border border-yellow-500/40 rounded p-2 text-white text-xs font-mono mb-3 focus:outline-none focus:border-yellow-400">
        <textarea id="mText" placeholder="Código HTML ou conteúdo de texto aqui..." class="hidden w-full h-48 bg-black border border-cyan-500/40 rounded p-2 text-white text-xs font-mono mb-4 focus:outline-none focus:border-cyan-400"></textarea>                                   
        <div class="flex gap-2">
            <button onclick="save()" class="flex-1 bg-cyan-500 text-black font-black py-2.5 rounded text-xs uppercase tracking-wider hover:bg-cyan-400 transition">Confirmar</button>
            <button onclick="closeModal()" class="flex-1 border border-slate-700 text-slate-400 py-2.5 rounded text-xs uppercase tracking-wider hover:text-white transition">Cancelar</button>
        </div>
    </div>

    <!-- RODAPÉ INDUSTRIAL -->
    <footer class="text-center text-[9px] text-slate-600 tracking-wider py-4 border-t border-slate-950 bg-[#020308] w-full mt-auto">
        SISTEMA COGNITIVO HELENA // DOMÍNIO: JDPSISTEMAS.COM.BR // CRIADOR: SR. JOSÉ DIVINO PRADO DA LAPA
    </footer>

    <script>
        // ENDEREÇO DO SEU SERVIDOR BACKEND RENDER
        const LOCAL_NODE = 'https://jdp-sistema-backend.onrender.com';
        let currentPath = '';
        let currentFilesList = []; 

        function logHELENA(msg) {
            const terminal = document.getElementById('terminalLogs');
            const time = new Date().toLocaleTimeString();
            terminal.innerHTML += `<br>[${time}] ${msg}`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Carregar arquivos e pastas do servidor
        async function load(path = '') {
            currentPath = path;
            document.getElementById('pathDisp').innerText = '/sdcard/' + path;
            try {
                const r = await fetch(`${LOCAL_NODE}/api/list?path=${encodeURIComponent(path)}`);
                const data = await r.json();
                currentFilesList = data.files || [];                                                   
                let html = '';
                
                if(currentPath) {
                    html += `
                    <div class="file-item p-4 flex items-center gap-3 cursor-pointer" onclick="goBack()">
                        <span class="text-lg">🔙</span>
                        <span class="text-xs text-cyan-400 font-bold uppercase">.. (Voltar para nível anterior)</span>
                    </div>`;
                }                                                                   
                
                if (data.files && data.files.length > 0) {
                    data.files.forEach(f => {
                        const isHtml = f.name.endsWith('.html');
                        const filePath = currentPath ? `${currentPath}/${f.name}` : f.name;
                        
                        html += `
                        <div class="file-item p-4 flex items-center justify-between cursor-pointer">
                            <div class="flex items-center gap-3 flex-1" onclick="${f.isDir ? `load('${filePath}')` : `openFile('${f.name}')`}">
                                <span class="text-lg">${f.isDir ? '📁' : '📄'}</span>
                                <div>
                                    <span class="text-xs text-white font-mono font-bold">${f.name}</span>
                                    <span class="block text-[8px] text-slate-500">Caminho: /${filePath}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${isHtml ? `
                                    <button onclick="runHtmlPage('${filePath}')" class="bg-cyan-500/20 hover:bg-cyan-500 text-cyan-300 hover:text-black border border-cyan-500/50 px-2 py-1 rounded text-[9px] font-bold uppercase transition">
                                        ⚡ EXECUTAR
                                    </button>
                                ` : ''}
                                <span class="text-[10px] text-slate-500 font-mono">${f.size || 'PASTA'}</span>
                            </div>
                        </div>`;
                    });
                    
                    triggerAndroidMirroring();
                } else {
                    html += `
                    <div class="p-8 text-center text-slate-500 text-xs font-bold uppercase">
                        <i class="fas fa-folder-open text-lg mb-2 block"></i>
                        Diretório vazio. Use o botão "+" para estruturar suas pastas.
                    </div>`;
                }
                document.getElementById('list').innerHTML = html;
            } catch (err) {
                document.getElementById('list').innerHTML = `
                <div class="p-8 text-center text-red-500 text-xs font-bold uppercase">
                    <i class="fas fa-exclamation-triangle text-lg mb-2 block"></i>
                    CONEXÃO EM ESPERA: SERVIDOR RENDER INICIALIZANDO...
                </div>`;
                logHELENA("ERRO: Tentando ler backup local no Android...");
                loadLocalAndroidFallback();
            }
        }

        // Executa o arquivo HTML diretamente no navegador
        function runHtmlPage(path) {
            logHELENA(`[EXECUTANDO]: Iniciando aplicação em /${path}`);
            // Abre diretamente a URL do arquivo no backend para renderizar no navegador
            const fileUrl = `${LOCAL_NODE}/api/open?path=${encodeURIComponent(path)}`;
            window.open(fileUrl, '_blank');
        }

        // ESPELHAMENTO ANDROID (Capacitor)
        async function triggerAndroidMirroring() {
            if (typeof Capacitor === 'undefined') {
                logHELENA("[HELENA]: Fora do ambiente Android. Simulação Ativa.");
                return;
            }
            const { Filesystem } = Capacitor.Plugins;
            const Directory = { Documents: 'DOCUMENTS' };

            document.getElementById('syncStatus').innerText = "Sincronizador Android: Espelhando...";
            document.getElementById('syncStatus').className = "text-[9px] text-cyan-400 font-mono animate-pulse";

            for (let file of currentFilesList) {
                if (!file.isDir) {
                    try {
                        const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                        const response = await fetch(`${LOCAL_NODE}/api/open?path=${encodeURIComponent(filePath)}`);
                        const content = await response.text();

                        await Filesystem.writeFile({
                            path: `JDP_Sistemas_Backup/${filePath}`,
                            data: content,
                            directory: Directory.Documents,
                            encoding: 'utf8',
                            recursive: true
                        });
                        logHELENA(`[OK] Espelhado localmente: /Documents/JDP_Sistemas_Backup/${filePath}`);
                    } catch (e) {
                        logHELENA(`[ERRO]: Falha ao espelhar ${file.name}: ${e.message}`);
                    }
                }
            }
            document.getElementById('syncStatus').innerText = "Sincronizador Android: 100% Sincronizado";
            document.getElementById('syncStatus').className = "text-[9px] text-green-400 font-mono";
        }

        async function loadLocalAndroidFallback() {
            if (typeof Capacitor === 'undefined') return;
            const { Filesystem } = Capacitor.Plugins;
            const Directory = { Documents: 'DOCUMENTS'; }
            try {
                logHELENA("[EMERGÊNCIA]: Lendo armazenamento local...");
                const result = await Filesystem.readdir({
                    path: `JDP_Sistemas_Backup/${currentPath}`,
                    directory: Directory.Documents
                });
                let html = '';
                if(currentPath) {
                    html += `
                    <div class="file-item p-4 flex items-center gap-3 cursor-pointer" onclick="goBack()">
                        <span class="text-lg">🔙</span>
                        <span class="text-xs text-yellow-400 font-bold uppercase">.. (Voltar Local)</span>
                    </div>`;
                }
                if (result.files && result.files.length > 0) {
                    result.files.forEach(f => {
                        const name = f.name || f;
                        const isDir = f.type === 'directory';
                        html += `
                        <div class="file-item p-4 flex items-center justify-between cursor-pointer" onclick="${isDir ? `load('${currentPath ? currentPath + '/' + name : name}')` : `openLocalFile('${name}')`}">
                            <div class="flex items-center gap-3">
                                <span class="text-lg">${isDir ? '📁' : '📄'}</span>
                                <span class="text-xs text-yellow-300 font-mono font-bold">${name} [LOCAL]</span>
                            </div>
                            <span class="text-[10px] text-slate-500 font-mono">OFFLINE</span>
                        </div>`;
                    });
                } else {
                    html += `<div class="p-8 text-center text-yellow-500 text-xs font-bold uppercase">Nenhum backup local.</div>`;
                }
                document.getElementById('list').innerHTML = html;
            } catch (err) {
                logHELENA("[CRÍTICO]: Sem conexão ativa e sem dados locais.");
            }
        }

        async function openLocalFile(name) {
            if (typeof Capacitor === 'undefined') return;
            const { Filesystem } = Capacitor.Plugins;
            const Directory = { Documents: 'DOCUMENTS' };
            try {
                const filePath = currentPath ? `JDP_Sistemas_Backup/${currentPath}/${name}` : `JDP_Sistemas_Backup/${name}`;
                const contents = await Filesystem.readFile({
                    path: filePath,
                    directory: Directory.Documents,
                    encoding: 'utf8'
                });
                alert(`[CONTEÚDO BACKUP LOCAL - ${name}]:\n\n${contents.data}`);
            } catch (e) {
                alert("Erro ao abrir arquivo local.");
            }
        }

        function forceBackupAll() {
            logHELENA("[COMANDO CRIADOR]: Sincronização forçada iniciada...");
            triggerAndroidMirroring();
            toggleMenu();
        }

        function openFile(name) {
            const filePath = currentPath ? currentPath + '/' + name : name;
            const fileUrl = `${LOCAL_NODE}/api/open?path=${encodeURIComponent(filePath)}`;
            window.open(fileUrl, '_blank');
        }

        function toggleMenu() {
            const m = document.getElementById('fabMenu');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function openModal(type) {
            window.lastType = type;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('mText').style.display = type === 'text' ? 'block' : 'none';
            document.getElementById('mTitle').innerText = type === 'text' ? 'Criar Novo Arquivo (.html / .txt)' : 'Criar Nova Pasta';
            document.getElementById('fabMenu').classList.add('hidden');
        }

        async function save() {
            const name = document.getElementById('mName').value;
            const content = document.getElementById('mText').value;
            if (!name) return;

            try {
                logHELENA(`Gravando ${name} no servidor Render...`);
                await fetch(`${LOCAL_NODE}/api/create`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ type: window.lastType, name, content, path: currentPath })
                });
                closeModal();
                load(currentPath); 
            } catch (err) {
                logHELENA("Erro no Render. Salvando em modo de contingência local...");
                saveLocalEmergency(name, content);
            }
        }

        async function saveLocalEmergency(name, content) {
            if (typeof Capacitor === 'undefined') {
                alert("Servidor indisponível.");
                return;
            }
            const { Filesystem } = Capacitor.Plugins;
            const Directory = { Documents: 'DOCUMENTS' };
            try {
                const filePath = currentPath ? `JDP_Sistemas_Backup/${currentPath}/${name}` : `JDP_Sistemas_Backup/${name}`;
                await Filesystem.writeFile({
                    path: filePath,
                    data: content || '',
                    directory: Directory.Documents,
                    encoding: 'utf8',
                    recursive: true
                });
                logHELENA(`[SALVO LOCALMENTE]: ${name}`);
                closeModal();
                loadLocalAndroidFallback();
            } catch (e) {
                logHELENA(`Falha ao gravar localmente: ${e.message}`);
            }
        }

        function closeModal() {
             document.getElementById('modal').classList.add('hidden');
             document.getElementById('mName').value = '';
             document.getElementById('mText').value = '';
        }

        function goBack() {
             let p = currentPath.split('/');
             p.pop();
             load(p.join('/'));
        }

        // Inicialização
        load();
    </script>
</body>
                </html>
