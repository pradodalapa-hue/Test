<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUER'S - SISTEMA LOGÍSTICO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Estilo Base - Bunker Digital (Fundo Preto Absoluto) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #ffffff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #14161d;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2330;
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00e5ff;
            font-size: 22px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        header p {
            font-size: 11px;
            color: #8fa0dd;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: bold;
        }

        /* Cards de Informação */
        .card {
            background: #1b1e28;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #ffbc0d;
        }

        .card-title {
            font-size: 11px;
            color: #ffbc0d;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card-content {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        .card-subtext {
            font-size: 13px;
            color: #a0aec0;
            margin-top: 5px;
            font-weight: normal;
        }

        .valor {
            color: #00e676;
            font-family: 'Orbitron', sans-serif;
        }

        /* Container do Mapa */
        #map-container {
            position: relative;
            margin-bottom: 15px;
        }

        #map {
            height: 340px;
            width: 100%;
            border-radius: 12px;
            border: 2px solid #ffbc0d;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Filtro de Modo Noturno para o OpenStreetMap */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Telemetria de GPS */
        .telemetria {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #11141a;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Orbitron', sans-serif;
            color: #00e5ff;
            margin-bottom: 15px;
            border: 1px solid #1f2330;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #00e676;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #00e676;
            animation: pulse 1.5s infinite;
        }

        /* Botão Finalizar */
        .btn-finalizar {
            width: 100%;
            background: #d32f2f;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
            transition: background 0.2s;
        }

        .btn-finalizar:active {
            background: #b71c1c;
            transform: scale(0.98);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DONY BURGUER'S</h1>
            <p>Sistema Logístico de Entrega</p>
        </header>

        <div class="card" style="border-left-color: #00e5ff;">
            <div class="card-title" style="color: #00e5ff;">Piloto Operacional:</div>
            <div class="card-content" style="font-family: 'Orbitron', sans-serif; letter-spacing: 1px;">BOLOLO</div>
        </div>

        <div class="card">
            <div class="card-title">📦 Entrega Atual Solicitada</div>
            <div class="card-content" id="nome-cliente">JOSÉ DIVINO PRADO DA LAPA</div>
            <div class="card-subtext" id="endereco-cliente">Rua Professor Ernani Simão, 1563</div>
            <div class="card-subtext" style="margin-top: 10px;">
                <span>VALOR: </span><span class="valor" id="valor-pedido">R$ 68,00</span>
            </div>
            <div class="card-subtext">
                <span>ITENS: </span><span id="itens-pedido" style="color: #ffffff; font-weight: bold;">COMBO 1</span>
            </div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>

        <div class="telemetria">
            <div><span class="status-dot"></span> <span style="color: #00e676;">ROTA TRAÇADA POR RUA</span></div>
            <div id="coordenadas">LAT: -2.990352 | LNG: -60.067340</div>
            <div id="precisao">PRECISÃO: 2.7m</div>
        </div>

        <button class="btn-finalizar" onclick="finalizarEntrega()">
            ✋ FINALIZAR ENTREGA
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let mapa;
        let marcadorBololo;
        let marcadorDestino;
        let linhaRotaNeon;

        // Coordenadas da Origem (Banca da Merenda)
        const latOrigem = -2.990352; 
        const lngOrigem = -60.067340;

        // Coordenadas Reais do Destino (Rua Professor Ernani Simão, 1563)
        const latCliente = -2.986500; 
        const lngCliente = -60.062000;

        window.onload = function() {
            // Inicializa o mapa focado na origem
            mapa = L.map('map').setView([latOrigem, lngOrigem], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(mapa);

            // Ícones em formato SVG nativo
            const iconeMoto = L.divIcon({
                html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#00e5ff" width="36px" height="36px"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>`,
                className: 'custom-gps-icon',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            const iconeCasa = L.divIcon({
                html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffbc0d" width="36px" height="36px"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3zm1 11h-2v-2h2v2z"/></svg>`,
                className: 'custom-home-icon',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            // Adiciona os marcadores iniciais
            marcadorBololo = L.marker([latOrigem, lngOrigem], {icon: iconeMoto}).addTo(mapa);
            marcadorBololo.bindPopup("<b style='color:#000;'>Piloto Bololo</b>").openPopup();

            marcadorDestino = L.marker([latCliente, lngCliente], {icon: iconeCasa}).addTo(mapa);
            marcadorDestino.bindPopup("<b style='color:#000;'>Destino: Rua Prof. Ernani Simão, 1563</b>");

            // CHAMAR O MOTOR DE ROTEAMENTO REAL
            calcularRotaPorRuas(latOrigem, lngOrigem, latCliente, lngCliente);

            ativarRastreamentoRealtime();
        };

        // Função que consome a API OSRM para obter os pontos exatos das ruas
        function calcularRotaPorRuas(latA, lngA, latB, lngB) {
            const url = `https://router.project-osrm.org/route/v1/driving/${lngA},${latA};${lngB},${latB}?overview=full&geometries=geojson`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        // Extrai as coordenadas da rua real feitas pelo motor de mapas
                        const coordenadasInvertidas = data.routes[0].geometry.coordinates;
                        
                        // O OSRM retorna [lng, lat], o Leaflet precisa de [lat, lng], então invertemos:
                        const pontosDaRua = coordenadasInvertidas.map(ponto => [ponto[1], ponto[0]]);

                        // Se já houver uma linha plotada, remove ela antes de desenhar a nova
                        if (linhaRotaNeon) {
                            mapa.removeLayer(linhaRotaNeon);
                        }

                        // Desenha a linha perfeitamente encaixada nas curvas das ruas
                        linhaRotaNeon = L.polyline(pontosDaRua, {
                            color: '#00e5ff',       // Azul Neon
                            weight: 6,              // Linha grossa e visível
                            opacity: 0.9,
                            lineJoin: 'round'
                        }).addTo(mapa);

                        // Ajusta a câmera do mapa para cobrir a rota real inteira
                        mapa.fitBounds(linhaRotaNeon.getBounds().pad(0.2));
                    }
                })
                .catch(err => {
                    console.log("Erro ao processar roteamento rodoviário. Usando linha de contingência reta.", err);
                    // Contingência caso caia a rede: faz linha reta temporária
                    linhaRotaNeon = L.polyline([[latA, lngA], [latB, lngB]], {
                        color: '#ff3d00', 
                        weight: 4, 
                        dashArray: '5, 10'
                    }).addTo(mapa);
                });
        }

        function activarRastreamentoRealtime() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(function(position) {
                    const novaLat = position.coords.latitude;
                    const novaLng = position.coords.longitude;
                    const precisaoMetros = position.coords.accuracy.toFixed(1);

                    marcadorBololo.setLatLng([novaLat, novaLng]);

                    document.getElementById('coordenadas').innerText = `LAT: ${novaLat.toFixed(6)} | LNG: ${novaLng.toFixed(6)}`;
                    document.getElementById('precisao').innerText = `PRECISÃO: ${precisaoMetros}m`;

                    // RECALCULA A ROTA EM TEMPO REAL CONFORME ELE ANDA PELAS RUAS
                    calcularRotaPorRuas(novaLat, novaLng, latCliente, lngCliente);

                }, function(error) {
                    console.log("Aguardando estabilização dos satélites.");
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
            }
        }

        function finalizarEntrega() {
            if (confirm("Deseja confirmar a entrega e encerrar o rastreamento desta rota?")) {
                alert("Entrega Concluída com sucesso!");
                window.location.reload();
            }
        }
    </script>
</body>
</html>
