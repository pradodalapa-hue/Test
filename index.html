<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZINHA SUPREME - JDP INDUSTRIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --gold: #f59e0b; 
            --dark: #0d0e12; 
            --card-bg: #161820; 
            --blue-tech: #00f2ff;
            --green: #10b981;
        }
        body { 
            background: var(--dark); 
            color: #e2e8f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        header { 
            border-bottom: 2px solid var(--blue-tech); 
            padding: 15px; 
            margin-bottom: 30px; 
            text-align: center; 
            background: var(--card-bg);
            border-radius: 8px;
        }
        header h1 { 
            color: var(--blue-tech);
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        .grid-pedidos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        .pedido-card { 
            background: var(--card-bg); 
            border: 1px solid #2d3142; 
            border-top: 6px solid var(--gold); 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
        }
        .pedido-header { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #2d3142; 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
        }
        .pedido-header strong {
            font-size: 1.3rem;
            color: var(--gold);
        }
        .item-linha { 
            padding: 8px 0; 
            border-bottom: 1px solid #1e293b; 
            font-size: 1.1rem; 
            color: #cbd5e1; 
        }
        .total { 
            margin-top: 20px; 
            font-size: 1.3rem; 
            color: var(--green); 
            text-align: right; 
            font-weight: bold;
        }
        .btn-concluir { 
            background: var(--blue-tech); 
            color: #000; 
            border: none; 
            width: 100%; 
            padding: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            border-radius: 6px; 
            font-size: 1.1rem; 
            transition: 0.2s;
        }
        .btn-concluir:active {
            filter: brightness(0.8);
        }
        .aviso-vazio { 
            grid-column: 1 / -1; 
            text-align: center; 
            color: #64748b; 
            margin-top: 100px; 
            font-size: 1.5rem; 
            font-weight: bold;
            text-transform: uppercase; 
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" sizes="192x192" href="icon-192.png">
    <link rel="icon" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<header>
    <h1>LEOCARDIOS BURGUER'S - ESTEIRA DE COZINHA</h1>
    <p style="color: var(--green); font-size: 12px; margin-top: 5px; font-weight: bold;">SISTEMA COZINHA ATIVO</p>
</header>

<div id="container-pedidos" class="grid-pedidos">
    <div class="aviso-vazio">Aguardando Pedidos...</div>
</div>

<script>
    const LOJA_ID = 'LEOVARDIOS_burguer_2026';
    
    firebase.initializeApp({ databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    
    let cacheChavesExistentes = new Set();
    let carregamentoInicialCompleto = false;
    
    // BLINDAGEM INDUSTRIAL: Guarda os IDs concluídos para impedir reaparecimento por delay de rede
    const idsConcluidosNaSessao = new Set();

    // SINAL SONORO AUTOMÁTICO: NOVO PEDIDO CHEGOU DO PDV
    function tocarSomNovoPedido() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = "sine";
            osc1.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.15);

            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = "sine";
                osc2.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.15);
            }, 200);
        } catch (e) {
            console.log("Interação necessária para liberar som.");
        }
    }

    // Escuta ativa travada unicamente no nó de produção alimentado pelo PDV
    db.ref(`lojas/${LOJA_ID}/producao_pendente`).on('value', (snapshot) => {
        const container = document.getElementById('container-pedidos');
        const pedidos = snapshot.val();
        
        if (!pedidos) {
            container.innerHTML = '<div class="aviso-vazio">Cozinha Limpa!</div>';
            cacheChavesExistentes.clear();
            carregamentoInicialCompleto = true;
            return;
        }

        // Monitora e dispara o som apenas se for um pedido novo válido e que não foi concluído aqui
        if (carregamentoInicialCompleto) {
            Object.keys(pedidos).forEach(chave => {
                const p = pedidos[chave];
                if (!cacheChavesExistentes.has(chave) && !idsConcluidosNaSessao.has(chave) && p.itens && (p.status === "Pendente" || p.status === "Espera" || p.status === "PREPARANDO")) {
                    tocarSomNovoPedido();
                }
            });
        }

        cacheChavesExistentes = new Set(Object.keys(pedidos));
        carregamentoInicialCompleto = true;
        container.innerHTML = '';
        
        let temPedidoNaTela = false;

        snapshot.forEach((filho) => {
            const pedido = filho.val();
            const idPedido = filho.key;
            
            // SEGURANÇA MÁXIMA: Ignora se for inválido ou se já foi concluído nesta sessão
            if (!pedido || !pedido.itens || !pedido.mesa || idsConcluidosNaSessao.has(idPedido)) {
                return; 
            }
            
            const statusAtual = (pedido.status || "").toUpperCase();

            // Exibe na tela apenas se o status do fluxo do PDV estiver correto
            if (statusAtual === "PENDENTE" || statusAtual === "ESPERA" || statusAtual === "PREPARANDO") {
                temPedidoNaTela = true;
                
                let itensHtml = '';
                const arrItens = Array.isArray(pedido.itens) ? pedido.itens : Object.values(pedido.itens);
                const mapaContagem = {};
                
                arrItens.forEach(i => {
                    if (i && i.nome) mapaContagem[i.nome] = (mapaContagem[i.nome] || 0) + 1;
                });
                
                itensHtml = Object.entries(mapaContagem).map(([nome, qtd]) => 
                    `<div class="item-linha">● ${qtd}x ${nome}</div>`
                ).join('');
                
                const div = document.createElement('div');
                div.className = 'pedido-card';
                div.id = `card-${idPedido}`;
                div.innerHTML = `
                    <div class="pedido-header">
                        <strong>${pedido.mesa}</strong>
                        <span style="font-size: 13px; color: #64748b; font-weight: bold;">${pedido.hora || ''}</span>
                    </div>
                    <div>${itensHtml}</div>
                    <div class="total">R$ ${parseFloat(pedido.total || 0).toFixed(2)}</div>
                    <button class="btn-concluir" onclick="finalizarPedido('${idPedido}')">CONCLUÍDO / LANCHE PRONTO</button>
                `;
                container.appendChild(div);
            }
        });

        if (!temPedidoNaTela) {
            container.innerHTML = '<div class="aviso-vazio">Cozinha Limpa!</div>';
        }
    });

    // Função que altera o status para PRONTO e remove imediatamente da UI usando o ID absoluto
    function finalizarPedido(id) {
        // Bloqueia localmente na hora: impede repetição por instabilidade da rede
        idsConcluidosNaSessao.add(id);
        
        // Remove visualmente de imediato da tela sem esperar a resposta do Firebase
        const card = document.getElementById(`card-${id}`);
        if (card) {
            card.remove();
        }
        
        // Verifica se a tela ficou vazia após a remoção local
        const container = document.getElementById('container-pedidos');
        if (container.children.length === 0) {
            container.innerHTML = '<div class="aviso-vazio">Cozinha Limpa!</div>';
        }

        // Atualiza a base de dados em nuvem
        db.ref(`lojas/${LOJA_ID}/producao_pendente/${id}`).update({
            status: "PRONTO",
            finalizadoEm: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
        }).catch(err => {
            console.error("Erro industrial ao atualizar status:", err);
            // Se falhar de verdade, devolve ao fluxo do sistema
            idsConcluidosNaSessao.delete(id);
        });
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => console.log('SISTEMA JDP: MOTOR ATIVO'));
        });
    }
<script src="caminho/para/seu/jdp-core.js"></script>
</body>
</html>
