<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>JDP | MONITORAMENTO SUPREME</title>
    <!-- Firebase e Leaflet -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100%; transition: all 1s ease; filter: invert(90%) hue-rotate(180deg); }
        
        #tv-midia { 
            position: absolute; bottom: 20px; right: 20px; width: 300px; height: 200px; 
            background: #000; border: 3px solid #f59e0b; border-radius: 10px; z-index: 1000;
            display: flex; align-items: center; justify-content: center; overflow: hidden; transition: all 0.5s;
        }
        #tv-midia .midia-content { width: 100%; height: 100%; object-fit: cover; }
        
        #btn-logo {
            position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px;
            z-index: 2000; cursor: pointer; border-radius: 50%; border: 3px solid #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); transition: 0.3s;
        }
        
        .modo-tv #map { height: 0%; opacity: 0; }
        .modo-tv #tv-midia { width: 100%; height: 100%; bottom: 0; right: 0; border: none; border-radius: 0; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="tv-midia"><div id="display-area"></div></div>
    
    <a href="http://localhost:9090/index.html" target="_blank">
        <img id="btn-logo" src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779767922601_1779137704141.png" alt="Cardápio">
    </a>

    <script>
        // --- INICIALIZAÇÃO ---
        firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerMotoboy, markerDestino;
        let adsCache = ["https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1776919033775_Engenheiro_Transparente__1_.png"];
        let adIndex = 0;

        // --- MOTOR DE PUBLICIDADE PRADO_67 ---
        function motorPublicidade() {
            db.ref(`publicidade/prado_67`).on('value', snap => {
                if(snap.exists()){ adsCache = Object.values(snap.val()); }
            });

            setInterval(() => {
                const displayArea = document.getElementById('display-area');
                if (adsCache.length > 0) {
                    adIndex = (adIndex + 1) % adsCache.length;
                    const url = adsCache[adIndex];
                    
                    displayArea.style.opacity = 0;
                    setTimeout(() => {
                        displayArea.innerHTML = url.match(/\.(mp4|webm|ogg)$/i) ? 
                            `<video class="midia-content" autoplay muted loop src="${url}"></video>` : 
                            `<img class="midia-content" src="${url}">`;
                        displayArea.style.opacity = 1;
                    }, 800);
                }
            }, 10000);
        }

        // --- LÓGICA DE RASTREIO ---
        db.ref(`lojas/${LOJA_ID}/motoboy_status`).on('value', snap => {
            const pos = snap.val();
            document.body.classList.toggle('modo-tv', !(pos && pos.online));
            
            if (pos && pos.online) {
                if (!markerMotoboy) {
                    markerMotoboy = L.marker([pos.latitude, pos.longitude], {
                        icon: L.divIcon({ html: '<div style="font-size:24px;">🛵</div>' })
                    }).addTo(map);
                } else {
                    markerMotoboy.setLatLng([pos.latitude, pos.longitude]);
                }
                map.panTo([pos.latitude, pos.longitude]);
            }
        });

        db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).on('value', snap => {
            const pedido = snap.val();
            if (pedido && pedido.latDestino) {
                if (!markerDestino) {
                    markerDestino = L.marker([pedido.latDestino, pedido.lngDestino], {
                        icon: L.divIcon({ html: '<div style="font-size:24px;">📍</div>' })
                    }).addTo(map).bindPopup("DESTINO DO SEU PEDIDO").openPopup();
                }
            }
        });

        // Inicializa motor
        motorPublicidade();
    </script>
</body>
</html>
