<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP InDrive - Motorista</title>
    <!-- Tailwind CSS para Interface Industrial -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SCRIPTS CORE DO FIREBASE (WEB V8 COMPATÍVEL) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .text-gold { color: #FFD700 !important; }
        .border-gold { border-color: #FFD700 !important; }
        .bg-gold { background-color: #FFD700 !important; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(80%); }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col overflow-hidden text-gold font-mono">

    <!-- TELA 1: CADASTRO DO MOTORISTA -->
    <div id="tela-cadastro" class="absolute inset-0 bg-[#0d0e12] z-50 flex flex-col justify-between p-6">
        <header class="border-b border-cyan-600/30 pb-4 text-center">
            <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-400">
                REGISTRO DE OPERADOR
            </h1>
            <p class="text-xs text-gray-500 mt-1">Soberania Digital - Identidade Local</p>
        </header>

        <main class="flex-1 flex flex-col justify-center gap-4 my-6 max-w-md mx-auto w-full">
            <div class="bg-zinc-900/50 p-5 rounded-xl border border-zinc-800 flex flex-col gap-4">
                <div>
                    <label class="block text-xs text-gold font-bold mb-2 uppercase">Nome Completo</label>
                    <input id="cad-nome" type="text" placeholder="DIGITE SEU NOME..." class="w-full bg-black border border-zinc-700 rounded-lg p-3 text-sm focus:outline-none focus:border-gold text-white uppercase font-bold">
                </div>

                <div>
                    <label class="block text-xs text-gold font-bold mb-2 uppercase">Foto do Rosto (Selfie)</label>
                    <div class="flex items-center gap-3">
                        <label class="flex-1 bg-zinc-800 border border-dashed border-zinc-600 rounded-lg p-3 text-center cursor-pointer hover:border-gold transition-all text-xs text-gray-400 font-bold uppercase">
                            <i class="fas fa-camera mr-2 text-gold"></i> <span id="label-foto">Selecionar Imagem</span>
                            <input id="cad-foto" type="file" accept="image/*" class="hidden" onchange="processarFoto(this)">
                        </label>
                        <div id="preview-container" class="w-12 h-12 rounded-full border border-gold bg-zinc-950 hidden overflow-hidden">
                            <img id="img-preview" src="" class="w-full h-full object-cover">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="salvarCadastro()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black py-4 rounded-xl shadow-lg uppercase tracking-wider">
                GRAVAR CREDENCIAIS
            </button>
        </main>

        <footer class="text-center text-[10px] text-zinc-600 border-t border-zinc-900 pt-2">
            JDP Industrial Hardware & Software Protocol
        </footer>
    </div>

    <!-- TELA 2: MAPA E OPERAÇÕES EM TEMPO REAL -->
    <div id="map" class="flex-1 z-0"></div>

    <!-- Painel de Operações Inferior -->
    <div class="absolute bottom-0 w-full bg-[#161820]/95 backdrop-blur-lg p-5 rounded-t-3xl border-t-2 border-gold z-10 max-h-[380px] flex flex-col justify-between">
        
        <!-- Radar de varredura -->
        <div id="radar-status" class="text-center text-sm text-zinc-500 py-6 border border-dashed border-zinc-800 rounded-xl">
            <i class="fas fa-radar animate-spin mr-2"></i>VARRENDO PERÍMETRO EM BUSCA DE CORRIDAS...
        </div>

        <!-- Card de Pedido Ativo Otimizado -->
        <div id="card-pedido" class="hidden flex flex-col gap-2">
            <!-- DISPLAY DE LONJURA (CÁLCULO HA VERSINE OFFLINE) -->
            <div id="painel-lonjura" class="bg-amber-950/40 border border-amber-600/40 rounded-lg p-2 text-center text-xs font-black text-amber-400 tracking-wider hidden">
                <i class="fas fa-route mr-1 animate-pulse"></i> DISTÂNCIA ATÉ O CLIENTE: <span id="view-lonjura" class="text-white">CALCULANDO...</span>
            </div>

            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <span class="bg-cyan-950 text-cyan-400 text-[10px] px-2 py-0.5 rounded font-bold border border-cyan-800 uppercase tracking-widest">NOVA SOLICITAÇÃO</span>
                    
                    <div class="mt-2 text-xs">
                        <p class="text-green-400 font-bold uppercase"><i class="fas fa-map-marker-alt mr-1"></i> DE: <span id="view-origem" class="text-white">---</span></p>
                        <p class="text-cyan-400 font-bold uppercase mt-1"><i class="fas fa-flag-checkered mr-1"></i> PARA: <span id="view-destino" class="text-white">---</span></p>
                    </div>
                </div>
                <div class="text-right pl-2">
                    <span class="text-[10px] text-zinc-400 block uppercase">OFERTA</span>
                    <span id="view-valor" class="text-xl font-black text-gold">R$ 00</span>
                </div>
            </div>

            <!-- Botões de Ação do Leilão -->
            <div class="grid grid-cols-2 gap-3 mt-1">
                <button onclick="aceitarDireto()" class="bg-gold text-black font-black py-3 rounded-lg text-xs uppercase tracking-wider transition-all active:scale-95">
                    ACEITAR VALOR
                </button>
                <button onclick="contraproposta()" class="border border-gold/40 hover:bg-zinc-900 text-gold font-bold py-3 rounded-lg text-xs uppercase tracking-wider transition-all active:scale-95">
                    PEDIR + R$ 5
                </button>
            </div>
        </div>

        <!-- Perfil do Operador Ativo, Status do GPS e Ação de Rota -->
        <div class="flex justify-between items-center border-t border-zinc-800 pt-3 mt-2">
            <div class="flex items-center gap-3">
                <img id="driver-avatar" src="" class="w-10 h-10 rounded-full border border-gold object-cover">
                <div>
                    <p id="entCliente" class="text-gold font-black text-xs uppercase">AGUARDANDO PROCESSO...</p>
                    <div id="statusGPS" class="text-[9px] font-black text-red-500 uppercase mt-0.5">🔴 GPS OFFLINE</div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnRota" onclick="alternarRastreamento()" class="bg-gold text-black font-black px-4 py-2 rounded-lg text-xs uppercase hidden">INICIAR ROTA</button>
                <button onclick="limparOperador()" class="bg-zinc-900 border border-red-900 text-red-500 px-2 py-2 rounded-lg text-xs" title="Sair do Perfil"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"
        };
        
        let database = null;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
        } catch (e) {
            console.error("Erro crítico de inicialização do Firebase contido.");
        }
        
        // Foco inicial no Tarumã-Açu
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // INTELIGÊNCIA GEOGRÁFICA INTERNA - BANCO DE DADOS DE MANAUS (OFFLINE-FIRST)
        const DICIONARIO_GEOGRAFICO = {
            "BANCA DA MERENDA": { lat: -2.990333, lng: -60.067333 },
            "COLONIA TERRA NOVA": { lat: -2.990333, lng: -60.067333 },
            "RUA BARE": { lat: -2.991100, lng: -60.066500 },
            "RUA NOVA VENEZA": { lat: -2.991500, lng: -60.065200 },
            "VENEZA": { lat: -2.991500, lng: -60.065200 },
            "AV. TORQUATO TAPAJOS": { lat: -3.023500, lng: -60.023200 }
        };

        // Função inteligente para extrair coordenadas baseadas no texto recebido
        function obterCoordenadasPorTexto(enderecoTexto) {
            if (!enderecoTexto) return null;
            const textoLimpo = enderecoTexto.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            for (const chave in DICIONARIO_GEOGRAFICO) {
                if (textoLimpo.includes(chave)) {
                    return DICIONARIO_GEOGRAFICO[chave];
                }
            }
            return null;
        }

        // ALGORITMO INDUSTRIAL DE HAVERSINE PARA PROVER SOBERANIA DIGITAL (CÁLCULO DE LONJURA OFFLINE)
        function calcularDistanciaOffline(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em KM
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Retorna em KM
        }

        let markerCliente = null, markerOrigem = null, markerBololo = null, watchId = null, emRota = false, valorAtualPassageiro = 0, fotoBase64 = "";
        let ultimoIdCorrida = ""; 
        let localizacaoAtualDispositivo = null; // Guarda posição do piloto em tempo real

        // Deixa o GPS do aparelho ativo em segundo plano para saber a lonjura instantaneamente
        function iniciarLeituraGpsDispositivo() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    localizacaoAtualDispositivo = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    };
                    if (!emRota) {
                        document.getElementById('statusGPS').innerText = "🟢 GPS ONLINE - AGUARDANDO";
                        document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');
                    }
                }, () => {
                    console.warn("Permissão de GPS negada ou indisponível localmente.");
                }, { enableHighAccuracy: true });
            }
        }

        function checarCadastro() {
            const perfil = localStorage.getItem("jdp_motorista_perfil");
            if (perfil) {
                const dados = JSON.parse(perfil);
                document.getElementById("tela-cadastro").classList.add("hidden");
                document.getElementById("driver-avatar").src = dados.foto;
                document.getElementById("entCliente").innerText = `PILOTO: ${dados.nome}`;
                iniciarLeituraGpsDispositivo();
            } else {
                document.getElementById("tela-cadastro").classList.remove("hidden");
            }
        }

        function processarFoto(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fotoBase64 = e.target.result;
                    document.getElementById("img-preview").src = fotoBase64;
                    document.getElementById("preview-container").classList.remove("hidden");
                    document.getElementById("label-foto").innerText = "FOTO CARREGADA";
                }
                reader.readAsDataURL(file);
            }
        }

        function salvarCadastro() {
            const nome = document.getElementById("cad-nome").value.trim().toUpperCase();
            if (!nome || !fotoBase64) {
                alert("ERRO: INFORME O NOME E TIRE A FOTO DO ROSTO!");
                return;
            }
            const dadosPerfil = { nome: nome, foto: fotoBase64 };
            localStorage.setItem("jdp_motorista_perfil", JSON.stringify(dadosPerfil));
            checarCadastro();
        }

        function limparOperador() {
            if(confirm("DESEJA REMOVER AS CREDENCIAIS DESTE DISPOSITIVO?")) {
                localStorage.removeItem("jdp_motorista_perfil");
                location.reload();
            }
        }

        // ESCUTADOR ASSÍNCRONO PROTEGIDO CONTRA ERRO 1081
        if (database) {
            try {
                database.ref("corrida_teste").on("value", (snapshot) => {
                    const card = document.getElementById('card-pedido');
                    const radar = document.getElementById('radar-status');
                    const btnRota = document.getElementById('btnRota');
                    const painelLonjura = document.getElementById('painel-lonjura');
                    const viewLonjura = document.getElementById('view-lonjura');
                    const dados = snapshot.val();
                    const perfil = JSON.parse(localStorage.getItem("jdp_motorista_perfil"));

                    if (dados) {
                        if (dados.status === "concluido" || dados.status === "finalizado") {
                            limparEstadoLocalVisual();
                            return;
                        }

                        if (dados.status === "procurando") {
                            radar.classList.add('hidden');
                            card.classList.remove('hidden');
                            btnRota.classList.add('hidden');
                            
                            document.getElementById('view-origem').innerText = dados.origem;
                            document.getElementById('view-destino').innerText = dados.destino;
                            document.getElementById('view-valor').innerText = `R$ ${dados.valor_oferecido}`;
                            valorAtualPassageiro = dados.valor_oferecido;

                            if (dados.id !== ultimoIdCorrida) {
                                if (markerCliente) map.removeLayer(markerCliente);
                                if (markerOrigem) map.removeLayer(markerOrigem);
                                markerCliente = null;
                                markerOrigem = null;
                                ultimoIdCorrida = dados.id;
                            }

                            // Executa inteligência de mapeamento local se faltar coordenadas na rede
                            let latO = dados.latOrigem, lngO = dados.lngOrigem;
                            let latD = dados.latDestino, lngD = dados.lngDestino;

                            const geoOrigem = obterCoordenadasPorTexto(dados.origem);
                            if (geoOrigem && !latO) { latO = geoOrigem.lat; lngO = geoOrigem.lng; }

                            const geoDestino = obterCoordenadasPorTexto(dados.destino);
                            if (geoDestino && !latD) { latD = geoDestino.lat; lngD = geoDestino.lng; }

                            // PROCESSAMENTO EM TEMPO REAL DA LONJURA
                            if (latO && lngO && localizacaoAtualDispositivo) {
                                const dist = calcularDistanciaOffline(
                                    localizacaoAtualDispositivo.lat, 
                                    localizacaoAtualDispositivo.lng, 
                                    latO, 
                                    lngO
                                );
                                viewLonjura.innerText = `${dist.toFixed(2)} KM`;
                                painelLonjura.classList.remove('hidden');
                            } else if (latO && lngO) {
                                viewLonjura.innerText = "AGUARDANDO GPS FIX...";
                                painelLonjura.classList.remove('hidden');
                            } else {
                                painelLonjura.classList.add('hidden');
                            }

                            // Renderiza Origem
                            if (latO && !markerOrigem) {
                                markerOrigem = L.marker([latO, lngO], {
                                    icon: L.divIcon({html: '<i class="fas fa-street-view text-2xl text-green-500"></i>', className: 'dummy'})
                                }).addTo(map).bindPopup("<b class='text-black'>BUSCAR CLIENTE AQUI</b>").openPopup();
                            }

                            // Renderiza Destino
                            if (latD && !markerCliente) {
                                markerCliente = L.marker([latD, lngD]).addTo(map)
                                    .bindPopup("<b class='text-black'>DESTINO FINAL</b>");
                            }
                            
                            if(latO) {
                                map.setView([latO, lngO], 15);
                            }
                        } else if (dados.status === "aceito") {
                            card.classList.add('hidden');
                            radar.classList.remove('hidden');
                            radar.innerHTML = "<span class='text-green-500 font-bold'>CORRIDA ACEITA! INICIE A VIAGEM.</span>";
                            btnRota.classList.remove('hidden');
                            painelLonjura.classList.add('hidden');
                        } else if (dados.status === "contraproposta") {
                            card.classList.add('hidden');
                            radar.classList.remove('hidden');
                            radar.innerHTML = `AGUARDANDO PASSAGEIRO ACEITAR R$ ${dados.contraproposta}`;
                            painelLonjura.classList.add('hidden');
                        }
                    } else {
                        ultimoIdCorrida = ""; 
                        card.classList.add('hidden');
                        radar.classList.remove('hidden');
                        radar.innerHTML = "<i class='fas fa-radar animate-spin mr-2'></i>VARRENDO PERÍMETRO EM BUSCA DE CORRIDAS...";
                        btnRota.classList.add('hidden');
                        painelLonjura.classList.add('hidden');
                        if (perfil) {
                            document.getElementById('entCliente').innerText = `PILOTO: ${perfil.nome}`;
                        }
                        if (markerCliente) { map.removeLayer(markerCliente); markerCliente = null; }
                        if (markerOrigem) { map.removeLayer(markerOrigem); markerOrigem = null; }
                    }
                }, (error) => {
                    console.warn("Conexão reiniciada silenciosamente para evitar travamentos.");
                });
            } catch (err) {
                console.error("Erro capturado no barramento de dados.");
            }
        }

        window.aceitarDireto = () => {
            if (database) {
                try {
                    database.ref("corrida_teste").update({ status: "aceito" }).catch(()=>{});
                } catch(e){}
            }
        };

        window.contraproposta = () => {
            if (database) {
                try {
                    database.ref("corrida_teste").update({
                        status: "contraproposta",
                        contraproposta: valorAtualPassageiro + 5
                    }).catch(()=>{});
                } catch(e){}
            }
        };

        function alternarRastreamento() {
            if(!emRota) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    const {latitude, longitude} = pos.coords;
                    localizacaoAtualDispositivo = {lat: latitude, lng: longitude};
                    
                    if(markerBololo) {
                        markerBololo.setLatLng([latitude, longitude]);
                    } else {
                        markerBololo = L.marker([latitude, longitude], {
                            icon: L.divIcon({html: '<i class="fas fa-motorcycle text-2xl text-yellow-500"></i>', className: 'dummy'})
                        }).addTo(map);
                    }
                    map.setView([latitude, longitude], 16);
                }, null, {enableHighAccuracy: true});
                
                emRota = true;
                document.getElementById('btnRota').innerText = "CONCLUIR";
                document.getElementById('btnRota').classList.replace('bg-gold', 'bg-red-600');
                document.getElementById('btnRota').classList.add('text-white');
                document.getElementById('statusGPS').innerText = "🟢 EM ROTA - TRANSMITINDO";
                document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');
            } else {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                emRota = false;
                
                if (database) {
                    try {
                        database.ref("corrida_teste").update({ status: "finalizado" })
                        .then(() => { limparEstadoLocalVisual(); })
                        .catch(() => { limparEstadoLocalVisual(); });
                    } catch(e) {
                        limparEstadoLocalVisual();
                    }
                } else {
                    limparEstadoLocalVisual();
                }
            }
        }

        function limparEstadoLocalVisual() {
            ultimoIdCorrida = ""; 
            if (markerCliente) { map.removeLayer(markerCliente); markerCliente = null; }
            if (markerOrigem) { map.removeLayer(markerOrigem); markerOrigem = null; }
            if (markerBololo) { map.removeLayer(markerBololo); markerBololo = null; }
            
            document.getElementById('btnRota').innerText = "INICIAR ROTA";
            document.getElementById('btnRota').className = "bg-gold text-black font-black px-4 py-2 rounded-lg text-xs uppercase hidden";
            
            if (localizacaoAtualDispositivo) {
                document.getElementById('statusGPS').innerText = "🟢 GPS ONLINE - AGUARDANDO";
                document.getElementById('statusGPS').className = "text-[9px] font-black text-green-500 uppercase mt-0.5";
            } else {
                document.getElementById('statusGPS').innerText = "🔴 GPS OFFLINE";
                document.getElementById('statusGPS').className = "text-[9px] font-black text-red-500 uppercase mt-0.5";
            }
            
            const perfil = JSON.parse(localStorage.getItem("jdp_motorista_perfil"));
            if (perfil) {
                document.getElementById('entCliente').innerText = `PILOTO: ${perfil.nome}`;
            }
        }

        checarCadastro();
    </script>
</body>
</html>
