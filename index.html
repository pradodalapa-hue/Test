
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP InDrive - Motorista</title>
    <!-- Tailwind CSS para Interface Industrial -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SCRIPTS CORE DO FIREBASE (WEB V8 COMPATÍVEL) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        .text-gold { color: #FFD700 !important; }
        .border-gold { border-color: #FFD700 !important; }
        .bg-gold { background-color: #FFD700 !important; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(80%); }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col overflow-hidden text-gold font-mono">

    <!-- TELA 1: CADASTRO DO MOTORISTA -->
    <div id="tela-cadastro" class="absolute inset-0 bg-[#0d0e12] z-50 flex flex-col justify-between p-6">
        <header class="border-b border-cyan-600/30 pb-4 text-center">
            <h1 class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-400">
                REGISTRO DE OPERADOR
            </h1>
            <p class="text-xs text-gray-500 mt-1">Soberania Digital - Identidade Local</p>
        </header>

        <main class="flex-1 flex flex-col justify-center gap-4 my-6 max-w-md mx-auto w-full">
            <div class="bg-zinc-900/50 p-5 rounded-xl border border-zinc-800 flex flex-col gap-4">
                <div>
                    <label class="block text-xs text-gold font-bold mb-2 uppercase">Nome Completo</label>
                    <input id="cad-nome" type="text" placeholder="DIGITE SEU NOME..." class="w-full bg-black border border-zinc-700 rounded-lg p-3 text-sm focus:outline-none focus:border-gold text-white uppercase font-bold">
                </div>

                <div>
                    <label class="block text-xs text-gold font-bold mb-2 uppercase">Foto do Rosto (Selfie)</label>
                    <div class="flex items-center gap-3">
                        <label class="flex-1 bg-zinc-800 border border-dashed border-zinc-600 rounded-lg p-3 text-center cursor-pointer hover:border-gold transition-all text-xs text-gray-400 font-bold uppercase">
                            <i class="fas fa-camera mr-2 text-gold"></i> <span id="label-foto">Selecionar Imagem</span>
                            <input id="cad-foto" type="file" accept="image/*" class="hidden" onchange="processarFoto(this)">
                        </label>
                        <div id="preview-container" class="w-12 h-12 rounded-full border border-gold bg-zinc-950 hidden overflow-hidden">
                            <img id="img-preview" src="" class="w-full h-full object-cover">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="salvarCadastro()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black py-4 rounded-xl shadow-lg uppercase tracking-wider">
                GRAVAR CREDENCIAIS
            </button>
        </main>

        <footer class="text-center text-[10px] text-zinc-600 border-t border-zinc-900 pt-2">
            JDP Industrial Hardware & Software Protocol
        </footer>
    </div>

    <!-- TELA 2: MAPA E OPERAÇÕES EM TEMPO REAL -->
    <div id="map" class="flex-1 z-0"></div>

    <!-- Painel de Operações Inferior -->
    <div class="absolute bottom-0 w-full bg-[#161820]/95 backdrop-blur-lg p-5 rounded-t-3xl border-t-2 border-gold z-10 max-h-[300px] flex flex-col justify-between">
        
        <!-- Radar de varredura -->
        <div id="radar-status" class="text-center text-sm text-zinc-500 py-6 border border-dashed border-zinc-800 rounded-xl">
            <i class="fas fa-radar animate-spin mr-2"></i>VARRENDO PERÍMETRO EM BUSCA DE CORRIDAS...
        </div>

        <!-- Card de Pedido Ativo -->
        <div id="card-pedido" class="hidden">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <span class="bg-cyan-950 text-cyan-400 text-[10px] px-2 py-0.5 rounded font-bold border border-cyan-800 uppercase">NOVA SOLICITAÇÃO</span>
                    <h2 id="view-destino" class="text-md font-bold mt-1 text-white uppercase">---</h2>
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-zinc-400 block uppercase">OFERTA</span>
                    <span id="view-valor" class="text-xl font-black text-gold">R$ 00</span>
                </div>
            </div>

            <!-- Botões de Ação do Leilão -->
            <div class="grid grid-cols-2 gap-3 mt-2">
                <button onclick="aceitarDireto()" class="bg-gold text-black font-black py-3 rounded-lg text-xs uppercase tracking-wider">
                    ACEITAR VALOR
                </button>
                <button onclick="contraproposta()" class="border border-gold/40 hover:bg-zinc-900 text-gold font-bold py-3 rounded-lg text-xs uppercase tracking-wider">
                    PEDIR + R$ 5
                </button>
            </div>
        </div>

        <!-- Perfil do Operador Ativo, Status do GPS e Ação de Rota -->
        <div class="flex justify-between items-center border-t border-zinc-800 pt-3 mt-2">
            <div class="flex items-center gap-3">
                <img id="driver-avatar" src="" class="w-10 h-10 rounded-full border border-gold object-cover">
                <div>
                    <p id="entCliente" class="text-gold font-black text-xs uppercase">AGUARDANDO PROCESSO...</p>
                    <div id="statusGPS" class="text-[9px] font-black text-red-500 uppercase mt-0.5">🔴 GPS OFFLINE</div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnRota" onclick="alternarRastreamento()" class="bg-gold text-black font-black px-4 py-2 rounded-lg text-xs uppercase hidden">INICIAR ROTA</button>
                <button onclick="limparOperador()" class="bg-zinc-900 border border-red-900 text-red-500 px-2 py-2 rounded-lg text-xs" title="Sair do Perfil"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <script>
        // Configuração de Credenciais do Firebase unificadas com o passageiro
        const firebaseConfig = {
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerCliente = null, markerBololo = null, watchId = null, emRota = false, valorAtualPassageiro = 0, fotoBase64 = "";
        let ultimoIdCorrida = ""; 

        function checarCadastro() {
            const perfil = localStorage.getItem("jdp_motorista_perfil");
            if (perfil) {
                const dados = JSON.parse(perfil);
                document.getElementById("tela-cadastro").classList.add("hidden");
                document.getElementById("driver-avatar").src = dados.foto;
                document.getElementById("entCliente").innerText = `PILOTO: ${dados.nome}`;
            } else {
                document.getElementById("tela-cadastro").classList.remove("hidden");
            }
        }

        function processarFoto(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fotoBase64 = e.target.result;
                    document.getElementById("img-preview").src = fotoBase64;
                    document.getElementById("preview-container").classList.remove("hidden");
                    document.getElementById("label-foto").innerText = "FOTO CARREGADA";
                }
                reader.readAsDataURL(file);
            }
        }

        function salvarCadastro() {
            const nome = document.getElementById("cad-nome").value.trim().toUpperCase();
            if (!nome || !fotoBase64) {
                alert("ERRO: INFORME O NOME E TIRE A FOTO DO ROSTO!");
                return;
            }
            const dadosPerfil = { nome: nome, foto: fotoBase64 };
            localStorage.setItem("jdp_motorista_perfil", JSON.stringify(dadosPerfil));
            checarCadastro();
        }

        function limparOperador() {
            if(confirm("DESEJA REMOVER AS CREDENCIAIS DESTE DISPOSITIVO?")) {
                localStorage.removeItem("jdp_motorista_perfil");
                location.reload();
            }
        }

        // DISPARADOR ESCUTADOR EM TEMPO REAL DIRECT DO FIREBASE
        database.ref("corrida_teste").on("value", (snapshot) => {
            const card = document.getElementById('card-pedido');
            const radar = document.getElementById('radar-status');
            const btnRota = document.getElementById('btnRota');
            const dados = snapshot.val();
            const perfil = JSON.parse(localStorage.getItem("jdp_motorista_perfil"));

            if (dados) {
                if (dados.status === "concluido" || dados.status === "finalizado") {
                    limparEstadoLocalVisual();
                    return;
                }

                if (dados.status === "procurando") {
                    radar.classList.add('hidden');
                    card.classList.remove('hidden');
                    btnRota.classList.add('hidden');
                    document.getElementById('view-destino').innerText = dados.destino;
                    document.getElementById('view-valor').innerText = `R$ ${dados.valor_oferecido}`;
                    valorAtualPassageiro = dados.valor_oferecido;

                    if (dados.id !== ultimoIdCorrida) {
                        if (markerCliente) {
                            map.removeLayer(markerCliente);
                            markerCliente = null;
                        }
                        ultimoIdCorrida = dados.id;
                    }

                    if (dados.latDestino && !markerCliente) {
                        markerCliente = L.marker([dados.latDestino, dados.lngDestino]).addTo(map)
                            .bindPopup("<b class='text-black'>DESTINO DA CORRIDA</b>").openPopup();
                        map.setView([dados.latDestino, dados.lngDestino], 16);
                    }
                } else if (dados.status === "aceito") {
                    card.classList.add('hidden');
                    radar.classList.remove('hidden');
                    radar.innerHTML = "<span class='text-green-500 font-bold'>CORRIDA ACEITA! INICIE A VIAGEM.</span>";
                    btnRota.classList.remove('hidden');
                } else if (dados.status === "contraproposta") {
                    card.classList.add('hidden');
                    radar.classList.remove('hidden');
                    radar.innerHTML = `AGUARDANDO PASSAGEIRO ACEITAR R$ ${dados.contraproposta}`;
                }
            } else {
                ultimoIdCorrida = ""; 
                card.classList.add('hidden');
                radar.classList.remove('hidden');
                radar.innerHTML = "<i class='fas fa-radar animate-spin mr-2'></i>VARRENDO PERÍMETRO EM BUSCA DE CORRIDAS...";
                btnRota.classList.add('hidden');
                if (perfil) {
                    document.getElementById('entCliente').innerText = `PILOTO: ${perfil.nome}`;
                }
                if (markerCliente) { map.removeLayer(markerCliente); markerCliente = null; }
            }
        });

        window.aceitarDireto = () => {
            database.ref("corrida_teste").update({
                status: "aceito"
            });
        };

        window.contraproposta = () => {
            database.ref("corrida_teste").update({
                status: "contraproposta",
                contraproposta: valorAtualPassageiro + 5
            });
        };

        function alternarRastreamento() {
            if(!emRota) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    const {latitude, longitude} = pos.coords;
                    
                    if(markerBololo) {
                        markerBololo.setLatLng([latitude, longitude]);
                    } else {
                        markerBololo = L.marker([latitude, longitude], {
                            icon: L.divIcon({html: '<i class="fas fa-motorcycle text-2xl text-yellow-500"></i>', className: 'dummy'})
                        }).addTo(map);
                    }
                    map.setView([latitude, longitude], 16);
                }, null, {enableHighAccuracy: true});
                
                emRota = true;
                document.getElementById('btnRota').innerText = "CONCLUIR";
                document.getElementById('btnRota').classList.replace('bg-gold', 'bg-red-600');
                document.getElementById('btnRota').classList.add('text-white');
                document.getElementById('statusGPS').innerText = "🟢 EM ROTA - TRANSMITINDO";
                document.getElementById('statusGPS').classList.replace('text-red-500', 'text-green-500');
            } else {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                emRota = false;
                
                // Atualiza o nó direto no Firebase ditando a conclusão da corrida
                database.ref("corrida_teste").update({
                    status: "finalizado"
                }).then(() => {
                    limparEstadoLocalVisual();
                });
            }
        }

        function limparEstadoLocalVisual() {
            ultimoIdCorrida = ""; 
            if (markerCliente) {
                map.removeLayer(markerCliente);
                markerCliente = null;
            }
            if (markerBololo) {
                map.removeLayer(markerBololo);
                markerBololo = null;
            }
            document.getElementById('btnRota').innerText = "INICIAR ROTA";
            document.getElementById('btnRota').className = "bg-gold text-black font-black px-4 py-2 rounded-lg text-xs uppercase hidden";
            document.getElementById('statusGPS').innerText = "🔴 GPS OFFLINE";
            document.getElementById('statusGPS').className = "text-[9px] font-black text-red-500 uppercase mt-0.5";
            
            const perfil = JSON.parse(localStorage.getItem("jdp_motorista_perfil"));
            if (perfil) {
                document.getElementById('entCliente').innerText = `PILOTO: ${perfil.nome}`;
            }
        }

        checarCadastro();
    </script>
</body>
</html>
