<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>JDP | ACOMPANHAMENTO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0d0e12; }
        #map { height: 100vh; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(80%); }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerMotoboy, markerDestino;

        // 1. ESCUTA A POSIÇÃO DO MOTOBOY (TEMPO REAL)
        db.ref(`lojas/${LOJA_ID}/motoboy_status`).on('value', (snapshot) => {
            const pos = snapshot.val();
            if (pos && pos.online) {
                if (!markerMotoboy) {
                    markerMotoboy = L.marker([pos.latitude, pos.longitude], {
                        icon: L.divIcon({ html: '<div style="font-size:24px;">🛵</div>' })
                    }).addTo(map);
                } else {
                    markerMotoboy.setLatLng([pos.latitude, pos.longitude]);
                }
                map.panTo([pos.latitude, pos.longitude]);
            }
        });

        // 2. ESCUTA O DESTINO DO PEDIDO
        db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).on('value', (snapshot) => {
            const pedido = snapshot.val();
            if (pedido && pedido.latDestino) {
                if (!markerDestino) {
                    markerDestino = L.marker([pedido.latDestino, pedido.lngDestino], {
                        icon: L.divIcon({ html: '<div style="font-size:24px;">📍</div>' })
                    }).addTo(map).bindPopup("DESTINO DO SEU PEDIDO").openPopup();
                }
            }
        });
    </script>
</body>
</html>
