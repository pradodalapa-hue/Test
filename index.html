
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELENA Core - Engenharia de Elite JDP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK - O Cérebro do Sistema -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --blue-tech: #06b6d4; 
            --gold: #fde047; 
            --slate-dark: #020617; 
            --slate-panel: #0f172a;
        }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--slate-dark); 
            color: #fff;
            overflow-x: hidden;
        }

        .container { 
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779792501564_1778967155044.png'); 
            background-position: center; 
            background-size: cover; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 50px;
        }

        .wheel-logo { 
            width: 150px; 
            margin-top: 20px; 
            z-index: 5; 
            filter: drop-shadow(0 0 10px var(--blue-tech));
        }

        /* ROLETA */
        .wheel-wrapper {
            position: relative;
            margin-top: 30px;
            width: 332px;
            height: 332px;
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779788027075_Engenheiro_Transparente__4_.png');
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.2);
            border-radius: 50%;
        }

        .wheel__spinner { 
            width: 275px; 
            height: 275px; 
            position: relative; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            will-change: transform; 
        }

        .wheel__inside { 
            width: 100%; 
            height: 100%; 
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787837676_1001186385.png'); 
            background-size: cover; 
            border-radius: 50%; 
        }

        .wheel__pointer { 
            position: absolute; 
            top: -20px; 
            width: 60px; 
            z-index: 10; 
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .wheel__button { 
            position: absolute; 
            width: 80px; 
            height: 80px; 
            background-color: #000; 
            border: 4px solid var(--gold); 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 11; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--gold); 
            font-weight: bold; 
            box-shadow: 0 0 20px rgba(253, 224, 71, 0.4);
        }

        /* PAINEL PDV KERNEL */
        .pdv-kernel {
            width: 90%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--blue-tech);
            border-radius: 12px;
            margin-top: 30px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pdv-header {
            color: var(--blue-tech);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.3);
            padding-bottom: 5px;
        }

        .stock-item {
            display: flex;
            justify-content: space-between;
            background: rgba(2, 6, 23, 0.5);
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .qty-badge { color: var(--gold); font-weight: bold; }

        /* POPUP DE PRÊMIO */
        .popup { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; justify-content: center; align-items: center; 
            z-index: 100; backdrop-filter: blur(10px); 
        }

        .popup-content { 
            width: 320px; 
            height: 480px; 
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787455499_Engenheiro_Transparente__1_.png');
            background-size: contain; 
            background-repeat: no-repeat; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            padding-bottom: 40px; text-align: center; 
        }

        .img-premio { 
            width: 200px; height: 200px; object-fit: contain;
            margin-bottom: 20px; border-radius: 15px; 
            border: 2px solid var(--blue-tech);
        }

        .btn-resgatar { 
            background: linear-gradient(180deg, var(--gold), #ffb800); 
            border: none; padding: 15px 40px; border-radius: 50px; 
            font-weight: bold; color: #000; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(253, 224, 71, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789267039_1001186393.png" class="wheel-logo">
        
        <div class="wheel-wrapper">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789433798_Engenheiro_Transparente__6_.png" class="wheel__pointer">
            <div class="wheel__spinner" id="roleta">
                <div class="wheel__inside"></div>
            </div>
            <button class="wheel__button" id="btn-girar" onclick="processarGiro()">GIRAR</button>
        </div>

        <!-- PAINEL DE CONTROLE SR. JOSÉ -->
        <div class="pdv-kernel">
            <div class="pdv-header"><i class="fas fa-microchip"></i> Kernel Stock Control</div>
            <div id="lista-estoque">
                <!-- Sincronizado via Firebase -->
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div class="popup" id="modal-sucesso">
        <div class="popup-content">
            <img id="img-premio-dinamica" src="" class="img-premio">
            <button class="btn-resgatar" id="btn-confirmar">CONFIRMAR RESGATE</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO CRIADOR JOSÉ DIVINO
        const KERNEL_ID = "DONY_BURGER45";
        const firebaseConfig = {
            apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o",
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cacheProdutos = [];
        let roletaEmMovimento = false;
        let anguloAtual = 0;
        let itemSorteadoID = null;

        // SINCRONIZAÇÃO EM TEMPO REAL
        db.ref(`lojas/${KERNEL_ID}/cardapio`).on('value', snapshot => {
            const listContainer = document.getElementById('lista-estoque');
            listContainer.innerHTML = '';
            cacheProdutos = [];
            
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([id, info]) => {
                    cacheProdutos.push({ id, ...info });
                    listContainer.innerHTML += `
                        <div class="stock-item">
                            <span>${info.nome}</span>
                            <span class="qty-badge">${info.estoque || 0} UN</span>
                        </div>
                    `;
                });
            }
        });

        function processarGiro() {
            if (roletaEmMovimento) return;

            // Filtra apenas o que o Sr. José tem em estoque
            const disponiveis = cacheProdutos.filter(p => p.estoque > 0);

            if (disponiveis.length === 0) {
                alert("HELENA: Alerta de Sistema. Estoque zerado no PDV.");
                return;
            }

            roletaEmMovimento = true;
            const btn = document.getElementById('btn-girar');
            btn.disabled = true;

            // Lógica de Sorteio
            const sorteado = disponiveis[Math.floor(Math.random() * disponiveis.length)];
            itemSorteadoID = sorteado.id;

            // Animação de Engenharia (Mínimo 5 voltas)
            const voltas = 10;
            const extra = Math.floor(Math.random() * 360);
            anguloAtual += (voltas * 360) + extra;

            const roleta = document.getElementById('roleta');
            roleta.style.transform = `rotate(${anguloAtual}deg)`;

            setTimeout(() => {
                // Efeito Háptico
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                // Exibir prêmio
                document.getElementById('img-premio-dinamica').src = sorteado.imagem;
                document.getElementById('modal-sucesso').style.display = 'flex';
                
                roletaEmMovimento = false;
                btn.disabled = false;
            }, 4100);
        }

        document.getElementById('btn-confirmar').onclick = function() {
            if (itemSorteadoID) {
                // DESCONTO NO PDV (Lógica do Segundo Script)
                const item = cacheProdutos.find(p => p.id === itemSorteadoID);
                const novoEstoque = Math.max(0, (item.estoque || 0) - 1);
                
                db.ref(`lojas/${KERNEL_ID}/cardapio/${itemSorteadoID}`).update({
                    estoque: novoEstoque
                }).then(() => {
                    document.getElementById('modal-sucesso').style.display = 'none';
                    console.log("HELENA: Estoque atualizado com sucesso no Kernel.");
                });
            }
        };
    </script>
</body>
  </html>
