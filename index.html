<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DONY BURGUER'S - SISTEMA SOBERANO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .text-gold { color: #FFD700 !important; }
        .bg-gold { background-color: #FFD700 !important; }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col text-gold">

    <div id="map" class="flex-1 z-0"></div>

    <div class="absolute bottom-0 w-full bg-[#161820]/90 p-6 rounded-t-3xl border-t-2 border-gold z-10">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p id="entCliente" class="text-gold font-black text-lg uppercase">AGUARDANDO CORRIDA...</p>
                <p id="entEndereco" class="text-zinc-400 text-xs uppercase">---</p>
            </div>
            <div id="statusGPS" class="text-[10px] font-black text-red-500 uppercase">🔴 OFFLINE</div>
        </div>

        <div id="areaAcao">
            <button id="btnPrincipal" onclick="acaoPrincipal()" class="w-full bg-gold text-black font-black py-4 rounded-xl uppercase">AGUARDANDO...</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerCliente, markerBololo, watchId, estadoAtual = "AGUARDANDO";
        let pedidoAtivoId = null;

        // ÚNICO LISTENER DE FILA - EVITA CONFLITOS
        db.ref(`lojas/${LOJA_ID}/fila_pedidos`).limitToLast(1).on('child_added', (snapshot) => {
            if(estadoAtual !== "AGUARDANDO") return; // Não aceita nova oferta se já estiver em rota
            
            const pedido = snapshot.val();
            pedidoAtivoId = snapshot.key;

            document.getElementById('entCliente').innerText = "NOVA CORRIDA: " + pedido.nome_cliente;
            document.getElementById('entEndereco').innerText = pedido.endereco_completo;
            
            const btn = document.getElementById('btnPrincipal');
            btn.innerText = "ACEITAR CORRIDA";
            btn.className = "w-full bg-green-600 text-white font-black py-4 rounded-xl uppercase";
            estadoAtual = "OFERTA_RECEBIDA";
        });

        function acaoPrincipal() {
            if(estadoAtual === "OFERTA_RECEBIDA") {
                aceitarCorrida();
            } else if(estadoAtual === "EM_ROTA") {
                finalizarEntrega();
            }
        }

        async function aceitarCorrida() {
            // Move da fila para pedido_em_entrega
            const refFila = db.ref(`lojas/${LOJA_ID}/fila_pedidos/${pedidoAtivoId}`);
            const snapshot = await refFila.once('value');
            const data = snapshot.val();

            await db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).set({
                ...data,
                id: pedidoAtivoId,
                status: "EM_ANDAMENTO"
            });
            await refFila.remove(); // Remove da fila
            
            estadoAtual = "EM_ROTA";
            document.getElementById('btnPrincipal').innerText = "FINALIZAR ENTREGA";
            document.getElementById('btnPrincipal').className = "w-full bg-red-600 text-white font-black py-4 rounded-xl uppercase";
            
            iniciarRastreamento();
        }

        function iniciarRastreamento() {
            watchId = navigator.geolocation.watchPosition(pos => {
                const {latitude, longitude} = pos.coords;
                if(markerBololo) markerBololo.setLatLng([latitude, longitude]);
                else markerBololo = L.marker([latitude, longitude]).addTo(map).bindPopup("VOCÊ");
                
                db.ref(`lojas/${LOJA_ID}/motoboy_status`).set({latitude, longitude, online: true});
            }, null, {enableHighAccuracy: true});
            
            document.getElementById('statusGPS').innerText = "🟢 TRANSMITINDO";
        }

        async function finalizarEntrega() {
            navigator.geolocation.clearWatch(watchId);
            await db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).remove();
            await db.ref(`lojas/${LOJA_ID}/motoboy_status`).update({online: false});
            location.reload(); // Reseta tudo para começar limpo
        }
    </script>
</body>
</html>
