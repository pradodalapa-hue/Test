<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP SISTEMAS — SOBERANO FILE MANAGER</title>
    <style>
        :root { --gold: #D4AF37; --header: #0f172a; --bg: #000; --cyan: #06b6d4; }
        body { margin: 0; background: var(--bg); color: var(--gold); font-family: monospace; user-select: none; }
        .app-bar { background: var(--header); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(6, 182, 212, 0.2); }
        .file-list { padding: 10px; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(253, 224, 71, 0.05); cursor: pointer; }
        .file-item:hover { background: rgba(6, 182, 212, 0.08); }
        .name { font-size: 14px; font-weight: bold; color: white; }
        .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        .fab { background: var(--cyan); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.6); cursor: pointer; }
        .fab-menu { display: none; position: absolute; bottom: 70px; right: 0; flex-direction: column; gap: 10px; width: 180px; }
        .fab-btn { background: #0f172a; border: 1px solid var(--gold); color: white; padding: 12px; border-radius: 8px; font-size: 12px; text-align: center; font-weight: bold; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; width: 85%; max-w-md: padding: 20px; border: 2px solid var(--gold); z-index: 10000; border-radius: 12px; }
        input, textarea { width: 92%; background: #000; border: 1px solid rgba(6, 182, 212, 0.4); color: white; padding: 10px; margin: 10px 0; font-family: monospace; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
    </style>
</head>
<body>
    <div class="app-bar">
        <div style="display:flex; align-items:center; gap:15px;">
            <span onclick="goBack()" style="cursor:pointer;">⬅️</span>
            <div id="pathDisp" style="font-size:12px; font-weight:bold;">/sdcard/memoria-local</div>
        </div>
        <span style="font-size:9px; color:var(--cyan); font-weight:bold;">SISTEMA COGNITIVO HELENA</span>
    </div>

    <div id="list" class="file-list"></div>

    <div class="fab-container">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-btn" onclick="openModal('folder')">📁 Nova Pasta</div>
            <div class="fab-btn" onclick="openModal('text')">📄 Novo Texto</div>
        </div>
        <div class="fab" onclick="toggleMenu()">+</div>
    </div>

    <div id="modal" class="modal">
        <h3 id="mTitle" style="margin-top:0; color:white; font-size:14px; uppercase">Criar Item</h3>
        <input type="text" id="mName" placeholder="Nome do item...">
        <textarea id="mText" style="display:none" placeholder="Conteúdo do arquivo..."></textarea>
        <button onclick="save()" style="background:var(--gold); border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer; uppercase">Gravar no Celular</button>
        <button onclick="closeModal()" style="background:none; color:rgba(255,255,255,0.5); border:none; width:100%; margin-top:10px; cursor:pointer;">CANCELAR</button>
    </div>

    <script>
        let currentPath = '';
        
        // Simulação do Banco de Dados Local Sólido do Celular (LocalStorage persistente)
        function obterArmazenamento() {
            let dados = localStorage.getItem('JDP_STORAGE');
            return dados ? JSON.parse(dados) : [];
        }

        function salvarArmazenamento(dados) {
            localStorage.setItem('JDP_STORAGE', JSON.stringify(dados));
            // Sincroniza a existência da estrutura com a Antena Render para verificação remota
            fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ files: dados })
            }).catch(() => {});
        }

        async function load(path = '') {
            currentPath = path;
            document.getElementById('pathDisp').innerText = '/sdcard/' + path;
            
            const arquivos = obterArmazenamento();
            let html = '';
            
            if(currentPath) {
                html += `<div class="file-item" onclick="goBack()"><span class="name" style="color:var(--cyan)">🔙 .. (Voltar)</span></div>`;
            }
            
            // Filtra os arquivos do diretório atual
            const itensFiltrados = arquivos.filter(f => f.path === currentPath);
            
            if(itensFiltrados.length === 0) {
                html += `<div style="text-align:center; padding:40px; color:#555; font-size:12px;">PASTA PRIVADA VAZIA. MÍDIA LOCAL INTEGRADA.</div>`;
            }

            itensFiltrados.forEach(f => {
                html += `
                <div class="file-item" onclick="${f.isDir ? `load('${currentPath ? currentPath + '/' : ''}${f.name}')` : `openFile('${f.name}')`}">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span>${f.isDir ? '📁' : '📄'}</span>
                        <span class="name">${f.name}</span>
                    </div>
                    <span style="font-size:10px; color:#555;">${f.isDir ? 'PASTA' : 'LOCAL'}</span>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
        }

        function openFile(name) {
            const arquivos = obterArmazenamento();
            const arquivo = arquivos.find(f => f.name === name && f.path === currentPath);
            if(arquivo) {
                const blob = new Blob([arquivo.content], { type: 'text/plain; charset=utf-8' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
            }
        }

        function toggleMenu() {
            const m = document.getElementById('fabMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function openModal(type) {
            window.lastType = type;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('mText').style.display = type === 'text' ? 'block' : 'none';
            document.getElementById('fabMenu').style.display = 'none';
        }

        async function save() {
            const name = document.getElementById('mName').value;
            const content = document.getElementById('mText').value;
            if(!name) return;

            let arquivos = obterArmazenamento();
            arquivos.push({
                name: name,
                isDir: window.lastType === 'folder',
                content: content || '',
                path: currentPath
            });

            salvarArmazenamento(arquivos);
            closeModal();
            load(currentPath);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('mName').value = '';
            document.getElementById('mText').value = '';
        }

        function goBack() {
            let p = currentPath.split('/');
            p.pop();
            load(p.join('/'));
        }

        load();
    </script>
</body>
</html>
