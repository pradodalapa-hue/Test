<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUER'S - PAINEL INDUSTRIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .bg-gold { background-color: #FFD700; }
        .text-gold { color: #FFD700; }
        .border-gold { border-color: #FFD700; }
        /* Filtro industrial para o mapa */
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(80%); }
    </style>
</head>
<body class="bg-[#0d0e12] text-[#e2e8f0] font-sans h-screen flex flex-col">

    <!-- Mapa ocupando o fundo -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <header class="relative z-10 bg-[#161820]/90 p-4 text-center border-b-2 border-gold shadow-lg">
        <h1 class="text-xl font-black tracking-wider text-gold">DONY BURGUER'S</h1>
    </header>

    <main class="relative z-10 flex-1 p-4 flex flex-col justify-end gap-4 max-w-md mx-auto w-full">
        
        <div id="areaIdentificacao" class="bg-[#161820]/90 rounded-xl p-4 border border-zinc-700 shadow-xl">
            <label class="block text-[10px] font-black uppercase tracking-wider text-gold mb-1">Piloto:</label>
            <input type="text" id="nomeMotoboy" class="w-full p-2 bg-[#0d0e12] border border-zinc-600 rounded text-white font-bold text-center uppercase" placeholder="NOME DO PILOTO">
        </div>

        <div class="bg-[#161820]/90 rounded-xl p-4 border-l-4 border-gold shadow-xl">
            <div id="dadosEntrega">
                <p class="text-xs text-zinc-500 font-mono">CLIENTE:</p>
                <p id="entCliente" class="text-white font-bold text-lg uppercase mb-2">AGUARDANDO...</p>
                <p class="text-xs text-zinc-500 font-mono">ENDEREÇO:</p>
                <p id="entEndereco" class="text-zinc-300 font-medium text-sm">---</p>
            </div>
        </div>

        <button id="btnRota" onclick="alternarRastreamento()" class="w-full bg-gold hover:bg-yellow-500 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-all">
            Iniciar Rota
        </button>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';

        // Inicializa Mapa
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let watchId = null;
        let emRota = false;
        let markerBololo = null;
        let markerDestino = null;

        db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).on('value', snap => {
            const pedido = snap.val();
            if(pedido) {
                document.getElementById('entCliente').innerText = pedido.cliente.toUpperCase();
                document.getElementById('entEndereco').innerText = pedido.endereco.toUpperCase();
                
                // Marca destino no mapa
                if(pedido.latDestino) {
                    if(markerDestino) map.removeLayer(markerDestino);
                    markerDestino = L.marker([pedido.latDestino, pedido.lngDestino]).addTo(map).bindPopup("DESTINO").openPopup();
                }
            } else {
                document.getElementById('entCliente').innerText = "AGUARDANDO...";
                document.getElementById('entEndereco').innerText = "---";
            }
        });

        function alternarRastreamento() {
            const btn = document.getElementById('btnRota');
            const nome = document.getElementById('nomeMotoboy').value.trim().toUpperCase();

            if (nome === "") { alert("INSIRA SEU NOME!"); return; }

            if (!emRota) {
                document.getElementById('nomeMotoboy').disabled = true;
                watchId = navigator.geolocation.watchPosition(pos => enviarDadosGps(pos, nome), null, {enableHighAccuracy: true});
                emRota = true;
                btn.innerText = "FINALIZAR ENTREGA";
                btn.classList.replace('bg-gold', 'bg-red-600');
            } else {
                navigator.geolocation.clearWatch(watchId);
                db.ref(`lojas/${LOJA_ID}/motoboy_status`).set({ online: false });
                db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).remove();
                
                location.reload(); // Recarrega para limpar estado
            }
        }

        function enviarDadosGps(posicao, nome) {
            const lat = posicao.coords.latitude;
            const lng = posicao.coords.longitude;

            // Atualiza marker do motoboy
            if(markerBololo) markerBololo.setLatLng([lat, lng]);
            else markerBololo = L.marker([lat, lng], {icon: L.divIcon({html: '<i class="fas fa-motorcycle text-2xl text-gold"></i>'})}).addTo(map);
            
            map.setView([lat, lng]); // Segue o motoboy

            db.ref(`lojas/${LOJA_ID}/motoboy_status`).set({
                online: true, nome, latitude: lat, longitude: lng
            });
        }
    </script>
</body>
</html>
