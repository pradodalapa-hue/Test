<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUER'S - SISTEMA SOBERANO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(80%); }
        .text-gold { color: #FFD700; }
        .border-gold { border-color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col overflow-hidden">

    <!-- Modal de Entregas -->
    <div id="modalEntregas" class="hidden absolute inset-0 bg-[#0d0e12]/95 z-[2000] p-6 text-gold overflow-y-auto">
        <button onclick="document.getElementById('modalEntregas').classList.add('hidden')" class="text-white text-2xl font-bold mb-4"><i class="fas fa-times"></i> FECHAR</button>
        <h2 id="tituloModal" class="text-2xl font-bold uppercase mb-4 text-center border-b border-gold pb-2"></h2>
        <div id="listaConteudo" class="space-y-4"></div>
    </div>

    <!-- Menu Flutuante -->
    <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
        <button onclick="verPendentes()" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-clock"></i> Pendentes
        </button>
        <button onclick="verEntregaAtual()" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-map-marker-alt"></i> Entrega Atual
        </button>
        <button onclick="verConcluidas()" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-check-circle"></i> Concluídas
        </button>
    </div>

    <div id="map" class="flex-1 z-0"></div>

    <div class="absolute bottom-0 w-full bg-[#161820]/90 backdrop-blur-lg p-6 rounded-t-3xl border-t-2 border-gold shadow-2xl z-10">
        <input type="text" id="nomeMotoboy" class="w-full p-2 mb-4 bg-[#0d0e12] border border-zinc-700 rounded-lg text-gold font-bold text-center uppercase" placeholder="NOME DO PILOTO">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p id="entCliente" class="text-white font-bold text-lg">AGUARDANDO PEDIDO...</p>
                <p id="entEndereco" class="text-zinc-400 text-xs">---</p>
            </div>
            <div id="statusGPS" class="text-[10px] font-black text-red-500 uppercase">🔴 OFFLINE</div>
        </div>
        <button id="btnRota" onclick="alternarRastreamento()" class="w-full bg-gold hover:bg-yellow-500 text-black font-black py-4 rounded-xl shadow-[0_0_15px_rgba(255,215,0,0.4)] transition-all uppercase">
            <i class="fas fa-motorcycle"></i> Iniciar Rota
        </button>
    </div>

    <script>
        firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerBololo, markerCliente, watchId, emRota = false;

        // Funções do Modal e Dados
        function abrirModal(titulo, dados) {
            const modal = document.getElementById('modalEntregas');
            const lista = document.getElementById('listaConteudo');
            document.getElementById('tituloModal').innerText = titulo;
            lista.innerHTML = '';
            
            if(!dados) lista.innerHTML = '<p class="text-center">Nenhum dado encontrado.</p>';
            else Object.values(dados).forEach(item => {
                lista.innerHTML += `
                    <div class="border border-gold p-4 rounded-lg bg-black/50">
                        <p class="font-bold text-white uppercase">${item.cliente || 'Sem Nome'}</p>
                        <p class="text-xs text-zinc-400">${item.endereco || 'Sem endereço'}</p>
                    </div>`;
            });
            modal.classList.remove('hidden');
        }

        function verPendentes() {
            db.ref(`lojas/${LOJA_ID}/pendentes`).once('value', s => abrirModal("PENDENTES", s.val()));
        }

        function verConcluidas() {
            db.ref(`lojas/${LOJA_ID}/concluidas`).limitToLast(10).once('value', s => abrirModal("CONCLUÍDAS", s.val()));
        }

        function verEntregaAtual() {
            if(markerCliente) map.setView(markerCliente.getLatLng(), 18);
            else alert("Nenhuma entrega ativa no momento.");
        }

        function alternarRastreamento() {
            const nome = document.getElementById('nomeMotoboy').value;
            if(!nome) return alert("INSIRA O NOME!");
            if(!emRota) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    const {latitude, longitude} = pos.coords;
                    if(markerBololo) markerBololo.setLatLng([latitude, longitude]);
                    else markerBololo = L.marker([latitude, longitude], {icon: L.divIcon({html: '<i class="fas fa-motorcycle text-2xl text-gold"></i>'})}).addTo(map);
                    map.setView([latitude, longitude]);
                    db.ref(`lojas/${LOJA_ID}/motoboy_status`).set({latitude, longitude, online: true, nome});
                }, null, {enableHighAccuracy: true});
                emRota = true;
                document.getElementById('statusGPS').innerText = "🟢 TRANSMITINDO";
                document.getElementById('btnRota').innerText = "FINALIZAR ENTREGA";
            } else {
                navigator.geolocation.clearWatch(watchId);
                db.ref(`lojas/${LOJA_ID}/motoboy_status`).update({online: false});
                location.reload();
            }
        }
    </script>
</body>
</html>
