<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP SISTEMAS — SOBERANO FILE MANAGER</title>
    <style>
        :root { --gold: #D4AF37; --header: #0f172a; --bg: #000; --cyan: #06b6d4; }
        body { margin: 0; background: var(--bg); color: var(--gold); font-family: sans-serif; user-select: none; }
        .app-bar { background: var(--header); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(6, 182, 212, 0.2); position: sticky; top: 0; z-index: 1000; }
        .file-list { padding: 10px; padding-bottom: 100px; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(253, 224, 71, 0.05); cursor: pointer; }
        .file-item:hover { background: rgba(6, 182, 212, 0.08); }
        .name { font-size: 14px; font-weight: bold; color: white; }
        .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 9999; }
        .fab { background: var(--cyan); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.6); cursor: pointer; }
        .fab-menu { display: none; position: absolute; bottom: 70px; right: 0; flex-direction: column; gap: 10px; width: 180px; }
        .fab-btn { background: #0f172a; border: 1px solid var(--gold); color: white; padding: 12px; border-radius: 8px; font-size: 12px; text-align: center; font-weight: bold; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; width: 85%; max-width: 400px; padding: 20px; border: 2px solid var(--gold); z-index: 10000; border-radius: 12px; }
        input, textarea { width: 92%; background: #000; border: 1px solid rgba(6, 182, 212, 0.4); color: white; padding: 10px; margin: 10px 0; font-family: monospace; }
        button { background: var(--gold); border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; color: black; }
        .btn-conectar { background: none; border: 2px solid var(--cyan); color: var(--cyan); padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 20px auto; display: block; }
    </style>
</head>
<body>
    <div class="app-bar">
        <div style="display:flex; align-items:center; gap:15px;">
            <span onclick="goBack()" style="cursor:pointer;">⬅️</span>
            <div id="pathDisp" style="font-size:12px; font-weight:bold;">/sdcard (Desconectado)</div>
        </div>
        <span style="font-size:9px; color:var(--cyan); font-weight:bold;">SISTEMA COGNITIVO HELENA</span>
    </div>

    <div id="conexaoContainer">
        <button class="btn-conectar" onclick="conectarPastaCelular()">🔗 Vincular Pasta do Celular</button>
    </div>

    <div id="list" class="file-list" style="display:none;"></div>

    <div class="fab-container" id="fabContainer" style="display:none;">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-btn" onclick="openModal('folder')">📁 Nova Pasta</div>
            <div class="fab-btn" onclick="openModal('text')">📄 Novo Texto</div>
        </div>
        <div class="fab" onclick="toggleMenu()">+</div>
    </div>

    <div id="modal" class="modal">
        <h3 id="mTitle" style="margin-top:0; color:white; font-size:14px;">CRIAR ITEM</h3>
        <input type="text" id="mName" placeholder="Nome do item...">
        <textarea id="mText" style="display:none" rows="6" placeholder="Conteúdo do arquivo..."></textarea>
        <button onclick="save()">Gravar no Armazenamento</button>
        <button onclick="closeModal()" style="background:none; color:rgba(255,255,255,0.5); margin-top:10px;">CANCELAR</button>
    </div>

    <script>
        let dirHandle = null;
        let currentPathHandlers = [];
        let currentPathString = '';

        async function conectarPastaCelular() {
            try {
                // Abre o gerenciador nativo do Android para você escolher a pasta do seu celular
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                currentPathHandlers = [dirHandle];
                currentPathString = dirHandle.name;
                
                document.getElementById('conexaoContainer').style.display = 'none';
                document.getElementById('list').style.display = 'block';
                document.getElementById('fabContainer').style.display = 'block';
                
                await load();
            } catch (err) {
                alert("Permissão necessária para acessar os arquivos locais.");
            }
        }

        async function load() {
            document.getElementById('pathDisp').innerText = '/' + currentPathString;
            const currentDir = currentPathHandlers[currentPathHandlers.length - 1];
            let html = '';
            
            if (currentPathHandlers.length > 1) {
                html += `<div class="file-item" onclick="goBack()"><span class="name" style="color:var(--cyan)">🔙 .. (Voltar)</span></div>`;
            }

            let entries = [];
            for await (const entry of currentDir.values()) {
                entries.push(entry);
            }

            // Ordena pastas primeiro
            entries.sort((a, b) => (b.kind === 'directory') - (a.kind === 'directory'));

            if (entries.length === 0) {
                html += `<div style="text-align:center; padding:40px; color:#555; font-size:12px;">PASTA VAZIA.</div>`;
            }

            entries.forEach(entry => {
                const isDir = entry.kind === 'directory';
                html += `
                <div class="file-item" onclick="${isDir ? `entrarNaPasta('${entry.name}')` : `abrirArquivoLocal('${entry.name}')`}">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span>${isDir ? '📁' : '📄'}</span>
                        <span class="name">${entry.name}</span>
                    </div>
                    <span style="font-size:10px; color:#555;">${isDir ? 'PASTA' : 'ARQUIVO'}</span>
                </div>`;
            });
            
            document.getElementById('list').innerHTML = html;
        }

        async function entrarNaPasta(name) {
            const currentDir = currentPathHandlers[currentPathHandlers.length - 1];
            const nextDir = await currentDir.getDirectoryHandle(name);
            currentPathHandlers.push(nextDir);
            currentPathString += '/' + name;
            await load();
        }

        async function abrirArquivoLocal(name) {
            const currentDir = currentPathHandlers[currentPathHandlers.length - 1];
            const fileHandle = await currentDir.getFileHandle(name);
            const file = await fileHandle.getFile();
            const text = await file.text();
            
            // Abre o conteúdo textual diretamente em uma nova janela temporária
            const blob = new Blob([text], { type: 'text/plain; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        function toggleMenu() {
            const m = document.getElementById('fabMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function openModal(type) {
            window.lastType = type;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('mText').style.display = type === 'text' ? 'block' : 'none';
            document.getElementById('fabMenu').style.display = 'none';
        }

        async function save() {
            const name = document.getElementById('mName').value;
            const content = document.getElementById('mText').value;
            if (!name) return;

            const currentDir = currentPathHandlers[currentPathHandlers.length - 1];

            if (window.lastType === 'folder') {
                await currentDir.getDirectoryHandle(name, { create: true });
            } else {
                const fileHandle = await currentDir.getFileHandle(name, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(content || '');
                await writable.close();
            }

            closeModal();
            await load();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('mName').value = '';
            document.getElementById('mText').value = '';
        }

        async function goBack() {
            if (currentPathHandlers.length > 1) {
                currentPathHandlers.pop();
                let p = currentPathString.split('/');
                p.pop();
                currentPathString = p.join('/');
                await load();
            }
        }
    </script>
</body>
</html>
