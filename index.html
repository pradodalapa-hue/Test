<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUER'S - SISTEMA LOGÍSTICO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Estilo Base - Bunker Digital */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #ffffff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #14161d;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2330;
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00e5ff;
            font-size: 22px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        header p {
            font-size: 11px;
            color: #8fa0dd;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: bold;
        }

        /* Cards de Informação */
        .card {
            background: #1b1e28;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #ffbc0d;
        }

        .card-title {
            font-size: 11px;
            color: #ffbc0d;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card-content {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
        }

        .card-subtext {
            font-size: 13px;
            color: #a0aec0;
            margin-top: 5px;
            font-weight: normal;
        }

        .valor {
            color: #00e676;
            font-family: 'Orbitron', sans-serif;
        }

        /* Container do Mapa */
        #map-container {
            position: relative;
            margin-bottom: 15px;
        }

        #map {
            height: 320px;
            width: 100%;
            border-radius: 12px;
            border: 2px solid #ffbc0d;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Filtro Modo Noturno para o OpenStreetMap */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* Telemetria de GPS */
        .telemetria {
            display: flex;
            justify-content: space-between;
            background: #11141a;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Orbitron', sans-serif;
            color: #00e5ff;
            margin-bottom: 15px;
            border: 1px solid #1f2330;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #00e676;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #00e676;
            animation: pulse 1.5s infinite;
        }

        /* Botão Finalizar */
        .btn-finalizar {
            width: 100%;
            background: #d32f2f;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
            transition: background 0.2s;
        }

        .btn-finalizar:active {
            background: #b71c1c;
            transform: scale(0.98);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DONY BURGUER'S</h1>
            <p>Sistema Logístico de Entrega</p>
        </header>

        <div class="card" style="border-left-color: #00e5ff;">
            <div class="card-title" style="color: #00e5ff;">Piloto Operacional:</div>
            <div class="card-content" style="font-family: 'Orbitron', sans-serif; letter-spacing: 1px;">BOLOLO</div>
        </div>

        <div class="card">
            <div class="card-title">📦 Entrega Atual Solicitada</div>
            <div class="card-content" id="nome-cliente">JOSÉ DIVINO PRADO DA LAPA</div>
            <div class="card-subtext" id="endereco-cliente">Rua Professor Ernani Simão, 1563</div>
            <div class="card-subtext" style="margin-top: 10px;">
                <span>VALOR: </span><span class="valor" id="valor-pedido">R$ 68,00</span>
            </div>
            <div class="card-subtext">
                <span>ITENS: </span><span id="itens-pedido" style="color: #ffffff; font-weight: bold;">COMBO 1</span>
            </div>
        </div>

        <div id="map-container">
            <div id="map"></div>
        </div>

        <div class="telemetria">
            <div><span class="status-dot"></span> <span style="color: #00e676;">TRANSMITINDO ROTA</span></div>
            <div id="coordenadas">LAT: -2.990287 | LNG: -60.067419</div>
            <div id="precisao">PRECISÃO: 8.4m</div>
        </div>

        <button class="btn-finalizar" onclick="finalizarEntrega()">
            ✋ FINALIZAR ENTREGA
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Configurações e Variáveis de Controle do Mapa
        let mapa;
        let marcadorBololo;
        let marcadorDestino;

        // Coordenadas Fixas da Casa do Cliente (Rua Professor Ernani Simão, 1563)
        const latCliente = -2.986500; 
        const lngCliente = -60.062000;

        // Inicializa o sistema de mapas assim que a página carregar
        window.onload = function() {
            // Posição inicial padrão (Coordenada base do seu painel)
            const latInicial = -2.990287;
            const lngInicial = -60.067419;

            // 1. Criar o mapa focando na área da entrega
            mapa = L.map('map').setView([latInicial, lngInicial], 15);

            // 2. Adicionar as camadas de mapa do OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(mapa);

            // 3. Ícones Customizados
            const iconeMoto = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/2972/2972185.png', // Ícone de Moto de Entrega
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -32]
            });

            const iconeCasa = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/619/619153.png', // Ícone de Casa/Destino
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -32]
            });

            // 4. Inserir marcador do Entregador (Bololo)
            marcadorBololo = L.marker([latInicial, lngInicial], {icon: iconeMoto}).addTo(mapa);
            marcadorBololo.bindPopup("<b style='color:#000;'>Piloto Bololo</b><br>A caminho...").openPopup();

            // 5. Inserir marcador do Cliente
            marcadorDestino = L.marker([latCliente, lngCliente], {icon: iconeCasa}).addTo(mapa);
            marcadorDestino.bindPopup("<b style='color:#000;'>Destino do Cliente</b><br>Entregar aqui.");

            // Ajusta a tela automaticamente para mostrar os dois pontos ao mesmo tempo
            ajustarFocoMapa();

            // Ativa o rastreamento em tempo real do GPS do celular
            ativarRastreamentoRealtime();
        };

        // Função para enquadrar perfeitamente a rota na tela
        function ajustarFocoMapa() {
            const grupoMarcadores = new L.featureGroup([marcadorBololo, marcadorDestino]);
            mapa.fitBounds(grupoMarcadores.getBounds().pad(0.3));
        }

        // Captura a geolocalização nativa do hardware do celular
        function ativarRastreamentoRealtime() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(function(position) {
                    const novaLat = position.coords.latitude;
                    const novaLng = position.coords.longitude;
                    const precisaoMetros = position.coords.accuracy.toFixed(1);

                    // Move o marcador do Bololo suavemente no mapa
                    marcadorBololo.setLatLng([novaLat, novaLng]);

                    // Atualiza a barra de telemetria inferior na interface
                    document.getElementById('coordenadas').innerText = `LAT: ${novaLat.toFixed(6)} | LNG: ${novaLng.toFixed(6)}`;
                    document.getElementById('precisao').innerText = `PRECISÃO: ${precisaoMetros}m`;

                }, function(error) {
                    console.log("Erro ao capturar GPS real, mantendo simulação fixa: ", error.message);
                }, {
                    enableHighAccuracy: true, // Força o uso do hardware de GPS de alta precisão
                    maximumAge: 0,
                    timeout: 5000
                });
            } else {
                alert("GPS não suportado neste aparelho.");
            }
        }

        // Ação do Botão Vermelho de Finalizar
        function finalizarEntrega() {
            if (confirm("Deseja confirmar a entrega e finalizar a rota de transmissão?")) {
                alert("Entrega Concluída com sucesso! Sistema reiniciado.");
                // Aqui você pode colocar o seu comando de retorno para o PDV local
                window.location.reload();
            }
        }
    </script>
</body>
</html>
