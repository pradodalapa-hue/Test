<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP InDrive - Passageiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        .text-gold { color: #FFD700 !important; }
        .border-gold { border-color: #FFD700 !important; }
        .bg-gold { background-color: #FFD700 !important; }
        #lista-sugestoes { max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col justify-between p-6 text-gold font-mono">

    <header class="border-b border-zinc-800 pb-4 text-center">
        <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-amber-300">
            JDP INDUSTRIAL - PASSAGEIRO
        </h1>
        <p class="text-xs text-gray-500 mt-1">Soberania Digital - Modo Passageiro</p>
    </header>

    <main class="flex-1 flex flex-col justify-center gap-4 max-w-md mx-auto w-full">
        <div class="bg-zinc-900/40 p-5 rounded-2xl border border-zinc-800/80 flex flex-col gap-4">
            
            <!-- ORIGEM -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 text-green-400">🟢 Ponto de Partida</label>
                <input id="origem" type="text" value="MEU LOCAL ATUAL (GPS ATIVO)" readonly class="w-full bg-black border border-zinc-700 rounded-xl p-3 text-sm focus:outline-none text-yellow-400 font-bold uppercase">
            </div>

            <!-- DESTINO COM BUSCA INTELIGENTE -->
            <div class="relative">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 text-cyan-400">🔵 Destino (Selecione na lista)</label>
                <input id="destino" type="text" placeholder="DIGITE O DESTINO..." class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-400 text-white font-bold uppercase">
                <div id="lista-sugestoes" class="absolute z-50 bg-black border border-gold w-full mt-1 rounded-xl shadow-2xl hidden"></div>
            </div>

            <!-- VALOR -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider mb-2">Sua Oferta (R$)</label>
                <input id="valor" type="number" value="15" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-gold text-white font-bold text-lg">
            </div>
        </div>

        <button onclick="solicitarCorrida()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black py-4 rounded-xl shadow-lg uppercase tracking-wider text-sm">
            SOLICITAR MOTORISTA
        </button>

        <div class="bg-zinc-900/20 rounded-2xl border border-dashed border-zinc-800 p-4 min-h-[110px] flex flex-col justify-between">
            <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Status do Barramento</span>
            <div id="status-leilao" class="text-xs text-zinc-400 my-2 font-bold uppercase">Conectando...</div>
            <div id="container-acao-passageiro" class="hidden pt-2 border-t border-zinc-900"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const MAPA_INTERNO_MANAUS = {
            "BANCA DA MERENDA": { lat: -2.990333, lng: -60.067333, nomeOficial: "BANCA DA MERENDA (COLÔNIA TERRA NOVA)" },
            "RUA NOVA VENEZA": { lat: -2.991500, lng: -60.065200, nomeOficial: "RUA NOVA VENEZA (TERRA NOVA)" },
            "TORQUATO TAPAJOS": { lat: -3.033500, lng: -60.024600, nomeOficial: "AV. TORQUATO TAPAJÓS" },
            "DJALMA BATISTA": { lat: -3.102300, lng: -60.021100, nomeOficial: "AV. DJALMA BATISTA" },
            "CENTRO": { lat: -3.131600, lng: -60.024200, nomeOficial: "CENTRO HISTÓRICO DE MANAUS" }
        };

        // Motor de Busca
        const campoDestino = document.getElementById("destino");
        const lista = document.getElementById("lista-sugestoes");

        campoDestino.addEventListener("input", (e) => {
            const termo = e.target.value.toUpperCase();
            lista.innerHTML = "";
            const matches = Object.keys(MAPA_INTERNO_MANAUS).filter(k => k.includes(termo));
            
            if (termo.length > 0 && matches.length > 0) {
                lista.classList.remove("hidden");
                matches.forEach(k => {
                    const div = document.createElement("div");
                    div.className = "p-3 text-xs text-white border-b border-zinc-800 hover:bg-zinc-800 cursor-pointer";
                    div.innerText = MAPA_INTERNO_MANAUS[k].nomeOficial;
                    div.onclick = () => {
                        campoDestino.value = div.innerText;
                        campoDestino.dataset.lat = MAPA_INTERNO_MANAUS[k].lat;
                        campoDestino.dataset.lng = MAPA_INTERNO_MANAUS[k].lng;
                        lista.classList.add("hidden");
                    };
                    lista.appendChild(div);
                });
            } else {
                lista.classList.add("hidden");
            }
        });

        function solicitarCorrida() {
            const destLat = campoDestino.dataset.lat;
            const destLng = campoDestino.dataset.lng;

            if (!destLat) return alert("ERRO: SELECIONE UM DESTINO VÁLIDO NA LISTA!");

            const novaCorrida = {
                id: "RUN_" + Date.now(),
                origem: "Banca da Merenda",
                destino: campoDestino.value,
                valor_oferecido: parseFloat(document.getElementById("valor").value),
                latOrigem: -2.990333, lngOrigem: -60.067333,
                latDestino: parseFloat(destLat), lngDestino: parseFloat(destLng),
                status: "procurando"
            };

            database.ref("corrida_teste").set(novaCorrida)
                .then(() => document.getElementById("status-leilao").innerText = "SOLICITAÇÃO ENVIADA!");
        }

        // Escutador
        database.ref("corrida_teste").on("value", (snap) => {
            const dados = snap.val();
            const status = document.getElementById("status-leilao");
            if (dados) status.innerText = "STATUS: " + dados.status.toUpperCase();
        });
    </script>
</body>
</html>
