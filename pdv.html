<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONY BURGUER'S - SISTEMA SOBERANO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(80%); }
        .text-gold { color: #FFD700; }
        .border-gold { border-color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
    </style>
</head>
<body class="bg-[#0d0e12] h-screen flex flex-col overflow-hidden">

    <!-- Menu Flutuante Superior Direito -->
    <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
        <button onclick="alert('Entregas Pendentes')" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-clock"></i> Pendentes
        </button>
        <button onclick="alert('Entrega Atual')" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-map-marker-alt"></i> Entrega Atual
        </button>
        <button onclick="alert('Entregas Concluídas')" class="bg-[#161820] border border-gold text-gold px-4 py-2 rounded-lg font-bold hover:bg-gold hover:text-black transition uppercase text-xs">
            <i class="fas fa-check-circle"></i> Concluídas
        </button>
    </div>

    <div id="map" class="flex-1 z-0"></div>

    <div class="absolute bottom-0 w-full bg-[#161820]/90 backdrop-blur-lg p-6 rounded-t-3xl border-t-2 border-gold shadow-2xl z-10">
        <div id="areaIdentificacao" class="mb-4">
            <input type="text" id="nomeMotoboy" class="w-full p-2 bg-[#0d0e12] border border-zinc-700 rounded-lg text-gold font-bold text-center uppercase" placeholder="NOME DO PILOTO">
        </div>

        <div class="flex justify-between items-center mb-4">
            <div>
                <p id="entCliente" class="text-white font-bold text-lg">AGUARDANDO PEDIDO...</p>
                <p id="entEndereco" class="text-zinc-400 text-xs">---</p>
            </div>
            <div id="statusGPS" class="text-[10px] font-black text-red-500 uppercase">🔴 OFFLINE</div>
        </div>

        <button id="btnRota" onclick="alternarRastreamento()" class="w-full bg-gold hover:bg-yellow-500 text-black font-black py-4 rounded-xl shadow-[0_0_15px_rgba(255,215,0,0.4)] transition-all uppercase">
            <i class="fas fa-motorcycle"></i> Iniciar Rota
        </button>
    </div>

    <script>
        firebase.initializeApp({databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"});
        const db = firebase.database();
        const LOJA_ID = 'LEOVARDIOS_burguer_2026';
        
        const map = L.map('map').setView([-2.9903, -60.0673], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markerBololo, markerCliente, watchId, emRota = false;

        db.ref(`lojas/${LOJA_ID}/pedido_em_entrega`).on('value', snap => {
            const p = snap.val();
            if(p) {
                document.getElementById('entCliente').innerText = p.cliente;
                document.getElementById('entEndereco').innerText = p.endereco;
                if(p.latDestino) {
                    if(markerCliente) map.removeLayer(markerCliente);
                    markerCliente = L.marker([p.latDestino, p.lngDestino]).addTo(map).bindPopup("DESTINO CLIENTE").openPopup();
                }
            }
        });

        function alternarRastreamento() {
            const nome = document.getElementById('nomeMotoboy').value;
            if(!nome) return alert("INSIRA O NOME!");

            if(!emRota) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    const {latitude, longitude} = pos.coords;
                    if(markerBololo) markerBololo.setLatLng([latitude, longitude]);
                    else markerBololo = L.marker([latitude, longitude], {icon: L.divIcon({html: '<i class="fas fa-motorcycle text-2xl text-gold"></i>'})}).addTo(map);
                    map.setView([latitude, longitude]);
                    db.ref(`lojas/${LOJA_ID}/motoboy_status`).set({latitude, longitude, online: true, nome});
                }, null, {enableHighAccuracy: true});
                
                emRota = true;
                document.getElementById('statusGPS').innerText = "🟢 TRANSMITINDO";
                document.getElementById('statusGPS').className = "text-[10px] font-black text-green-500 uppercase";
                document.getElementById('btnRota').innerText = "FINALIZAR ENTREGA";
            } else {
                navigator.geolocation.clearWatch(watchId);
                db.ref(`lojas/${LOJA_ID}/motoboy_status`).update({online: false});
                location.reload();
            }
        }
    </script>
</body>
</html>
