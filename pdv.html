<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELENA Core - Roleta de Elite JDP</title>
    <style>
        :root { --gold: #fde047; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        .container { background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779792501564_1778967155044.png'); background-position: center; background-size: cover; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; position: relative; }
        .wheel { position: relative; margin-top: 50px; width: 332px; height: 332px; background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779788027075_Engenheiro_Transparente__4_.png'); background-size: contain; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .wheel__spinner { width: 275px; height: 275px; position: relative; transition: transform 4s ease-out; will-change: transform; }
        .wheel__inside { width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787837676_1001186385.png'); background-size: cover; border-radius: 50%; }
        .wheel__button { position: absolute; width: 80px; height: 80px; background-color: #000; border: 4px solid var(--gold); border-radius: 50%; cursor: pointer; z-index: 11; display: flex; justify-content: center; align-items: center; color: var(--gold); font-weight: bold; }
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100; }
        .popup-content { width: 320px; height: 400px; background-size: contain; background-repeat: no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 40px; }
        .popup-failure { background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787318103_Engenheiro_Transparente.png'); }
        .popup-success { background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787455499_Engenheiro_Transparente__1_.png'); }
        .btn-popup { background: linear-gradient(180deg, #ffe600, #ffb800); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; color: #000; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wheel">
            <div class="wheel__spinner" id="roleta">
                <div class="wheel__inside"></div>
            </div>
            <button class="wheel__button" id="btn-girar" onclick="girar()">GIRAR</button>
        </div>
    </div>

    <div class="popup" id="modal-erro">
        <div class="popup-content popup-failure">
            <button class="btn-popup" onclick="fecharModais()">GIRAR DE NOVO</button>
        </div>
    </div>

    <div class="popup" id="modal-sucesso">
        <div class="popup-content popup-success">
            <button class="btn-popup" onclick="resgatarPremio()">RESGATAR PIX</button>
        </div>
    </div>

    <script>
        let giros = 0;
        const roleta = document.getElementById('roleta');
        const btnGirar = document.getElementById('btn-girar');

        function girar() {
            btnGirar.disabled = true;
            if(giros === 0) {
                roleta.style.transform = "rotate(1845deg)";
                giros++;
                setTimeout(() => {
                    document.getElementById('modal-erro').style.display = 'flex';
                    btnGirar.disabled = false;
                }, 4000);
            } else {
                roleta.style.transform = "rotate(3780deg)";
                setTimeout(() => {
                    document.getElementById('modal-sucesso').style.display = 'flex';
                }, 4000);
            }
        }

        function fecharModais() {
            document.getElementById('modal-erro').style.display = 'none';
        }

        function resgatarPremio() {
            window.location.href = "#";
        }
    </script>
</body>
</html>
